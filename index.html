<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding-bottom: 80px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #94a3b8; }
        .nav-btn.active { color: #2dd4bf; }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <div id="authSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl">
            <h1 id="headerLogo" class="text-3xl font-bold text-teal-500 text-center mb-6 cursor-pointer select-none">LIFECARE</h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-teal-500">
                <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-teal-500">
                <button id="loginBtn" onclick="runAuth('login')" class="w-full bg-teal-600 p-4 rounded-2xl font-bold">LOG IN</button>
                <button onclick="runAuth('register')" class="w-full text-slate-500 text-xs uppercase">First time? Register</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-10">
            <h2 id="pageTitle" class="text-xl font-bold text-teal-400">Dashboard</h2>
            <span id="userNameDisplay" class="text-xs text-slate-400"></span>
        </div>

        <div id="content" class="p-4 space-y-6">
            <div id="page-home" class="page-view space-y-6">
                <div class="glass p-6 rounded-3xl text-center">
                    <p id="locStatus" class="text-slate-400 text-xs mb-4 italic">Verifying Location...</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="clockAction('IN')" class="bg-emerald-600 p-8 rounded-2xl font-bold">CLOCK IN</button>
                        <button onclick="clockAction('OUT')" class="bg-rose-600 p-8 rounded-2xl font-bold">CLOCK OUT</button>
                    </div>
                </div>
            </div>

            <div id="page-admin" class="page-view hidden space-y-4">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="font-bold text-teal-400 mb-4">Set Geofence (Hospital Location)</h3>
                    <p class="text-[10px] text-slate-400 mb-4">Stand at the center of the hospital and click the button below to lock the coordinates.</p>
                    <button onclick="captureLocation()" class="w-full bg-slate-800 p-4 rounded-xl border border-teal-500/50 text-sm mb-4">📍 CAPTURE CURRENT LOCATION</button>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div>Lat: <span id="curLat">--</span></div>
                        <div>Lon: <span id="curLon">--</span></div>
                    </div>
                    <button onclick="saveAdminSettings()" class="w-full bg-teal-600 p-3 rounded-xl font-bold mt-4">SAVE SETTINGS</button>
                </div>
            </div>

            <div id="page-bio" class="page-view hidden glass p-6 rounded-3xl">Bio Data Content</div>
            <div id="page-history" class="page-view hidden glass p-6 rounded-3xl">2 Month Attendance History</div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center">
            <button onclick="nav('home')" class="nav-btn active"><span>🏠</span>Home</button>
            <button onclick="nav('history')" class="nav-btn"><span>📅</span>History</button>
            <button onclick="nav('leave')" class="nav-btn"><span>✈️</span>Leave</button>
            <button id="adminNav" onclick="nav('admin')" class="nav-btn admin-only"><span>⚙️</span>Admin</button>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzu4ZJyeifn_CEIKWJgpl39oxscN1VQbxqAU6a9TDfPLJa0120sJ-IDopfJJQ9N_K-NiA/exec";
        let hospitalLoc = { lat: 0, lon: 0 };

        // ADMIN ACCESS LOGIC
        let pressTimer;
        const logo = document.getElementById('headerLogo');
        logo.addEventListener('mousedown', () => pressTimer = setTimeout(openAdmin, 3000));
        logo.addEventListener('mouseup', () => clearTimeout(pressTimer));
        logo.addEventListener('touchstart', () => pressTimer = setTimeout(openAdmin, 3000));
        logo.addEventListener('touchend', () => clearTimeout(pressTimer));

        function openAdmin() {
            const pin = prompt("Enter Admin PIN:");
            if(pin === "1201") {
                document.getElementById('adminNav').style.display = "flex";
                alert("Admin Access Granted. Navigation menu updated.");
            }
        }

        function captureLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                hospitalLoc.lat = pos.coords.latitude;
                hospitalLoc.lon = pos.coords.longitude;
                document.getElementById('curLat').innerText = hospitalLoc.lat.toFixed(6);
                document.getElementById('curLon').innerText = hospitalLoc.lon.toFixed(6);
            });
        }

        function saveAdminSettings() {
            // This saves the location to the App's memory for this session
            // In a full build, we would send this to a "Settings" tab in your sheet
            alert("Hospital Location Locked: " + hospitalLoc.lat + ", " + hospitalLoc.lon);
            nav('home');
        }

        function nav(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.getElementById('pageTitle').innerText = pageId.toUpperCase();
        }

        // Login Logic (Same as previous versions)
        function runAuth(mode) { /* ... same runAuth logic ... */ }
    </script>
</body>
</html>
