<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare Admin & Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding-bottom: 90px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 9px; color: #94a3b8; }
        .nav-btn.active { color: #2dd4bf; }
        table { border-collapse: collapse; width: 100%; font-size: 10px; }
        th, td { border: 1px solid #334155; padding: 4px; text-center: center; }
        .status-P { color: #2dd4bf; font-weight: bold; } /* Present */
        .status-A { color: #f43f5e; } /* Absent */
        .status-W { color: #94a3b8; } /* Weekly Off */
    </style>
</head>
<body>

    <div id="authSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl">
            <h1 class="text-3xl font-bold text-teal-500 text-center mb-6">LIFECARE</h1>
            <input type="email" id="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-4 outline-none focus:border-teal-500 text-white">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-4 outline-none focus:border-teal-500 text-white">
            <button onclick="runAuth()" class="w-full bg-teal-600 p-4 rounded-2xl font-bold mb-4">LOG IN</button>
            <button onclick="openAdminPrompt()" class="w-full text-slate-500 text-xs uppercase tracking-widest">Admin Access</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-900 z-50">
            <h2 id="pageTitle" class="text-xl font-bold text-teal-400">DASHBOARD</h2>
            <button onclick="logout()" class="text-rose-500 text-[10px]">LOGOUT</button>
        </div>

        <div id="content" class="p-4">
            <div id="page-home" class="page-view space-y-6">
                <div class="glass p-8 rounded-3xl text-center">
                    <p id="userNameDisplay" class="text-lg font-bold mb-4"></p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="clockAction('IN')" class="bg-emerald-600 p-8 rounded-2xl font-bold">CLOCK IN</button>
                        <button onclick="clockAction('OUT')" class="bg-rose-600 p-8 rounded-2xl font-bold">CLOCK OUT</button>
                    </div>
                </div>
            </div>

            <div id="page-admin" class="page-view hidden space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-teal-400 font-bold mb-4">MONTHLY ATTENDANCE REPORT</h3>
                    <div class="flex gap-2 mb-4">
                        <select id="rptMonth" class="bg-slate-900 border border-slate-700 p-2 rounded text-xs">
                            <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                            <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                            <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                            <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                        </select>
                        <select id="rptYear" class="bg-slate-900 border border-slate-700 p-2 rounded text-xs">
                            <option value="2026">2026</option><option value="2025">2025</option>
                        </select>
                        <button onclick="generateReport()" class="bg-teal-600 px-4 py-2 rounded text-xs font-bold">GENERATE</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <div id="reportOutput"></div>
                    </div>
                </div>
            </div>
            
            </div>

        <div class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center">
            <button onclick="nav('home')" class="nav-btn active" id="nav-home"><span>🏠</span>Home</button>
            <button id="adminNav" onclick="nav('admin')" class="nav-btn hidden"><span>📊</span>Reports</button>
        </div>
    </div>

    <script>
        const CLOUD_URL = "YOUR_NEW_DEPLOYED_URL";
        let currentUser = null;

        window.onload = function() {
            const saved = localStorage.getItem('lifecare_user');
            if(saved) { currentUser = JSON.parse(saved); showApp(currentUser); }
        }

        function runAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const script = document.createElement('script');
            script.src = `${CLOUD_URL}?action=check_auth&email=${email}&password=${pass}&callback=handleAuth`;
            document.body.appendChild(script);
        }

        window.handleAuth = function(data) {
            if(data.exists) {
                currentUser = data;
                localStorage.setItem('lifecare_user', JSON.stringify(data));
                showApp(data);
            } else { alert("Failed"); }
        }

        function showApp(data) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = "Welcome, " + data.name;
        }

        function clockAction(type) {
            navigator.geolocation.getCurrentPosition(p => {
                const loc = p.coords.latitude.toFixed(4) + "," + p.coords.longitude.toFixed(4);
                const script = document.createElement('script');
                script.src = `${CLOUD_URL}?action=clock_action&id=${currentUser.id}&name=${encodeURIComponent(currentUser.name)}&desig=${encodeURIComponent(currentUser.desig)}&dept=${encodeURIComponent(currentUser.dept)}&type=${type}&location=${loc}&callback=handleClock`;
                document.body.appendChild(script);
            });
        }

        window.handleClock = function(d) { alert("Clocked " + d.type); }

        function generateReport() {
            const m = document.getElementById('rptMonth').value;
            const y = document.getElementById('rptYear').value;
            const script = document.createElement('script');
            script.src = `${CLOUD_URL}?action=get_report&month=${m}&year=${y}&callback=handleReport`;
            document.body.appendChild(script);
        }

        window.handleReport = function(data) {
            let html = `<table><thead><tr><th>Name</th>`;
            for(let d=1; d<=data.daysCount; d++) html += `<th>${d}</th>`;
            html += `<th>P</th><th>A</th><th>W</th></tr></thead><tbody>`;
            
            data.report.forEach(row => {
                html += `<tr><td class="whitespace-nowrap">${row.name}</td>`;
                row.days.forEach(day => {
                    html += `<td class="status-${day}">${day}</td>`;
                });
                html += `<td class="font-bold text-teal-400">${row.totalP}</td>`;
                html += `<td class="font-bold text-rose-400">${row.totalA}</td>`;
                html += `<td class="font-bold text-slate-400">${row.totalW}</td></tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('reportOutput').innerHTML = html;
        }

        function nav(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-'+id).classList.remove('hidden');
            document.getElementById('pageTitle').innerText = id.toUpperCase();
        }

        function openAdminPrompt() { if(prompt("Admin PIN") === "1201") document.getElementById('adminNav').classList.remove('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
