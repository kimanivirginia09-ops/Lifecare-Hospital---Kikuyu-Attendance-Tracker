<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background-color: #ffffff; }
    .lc-blue { background-color: #e0f2fe; }
    .tab-content { display: none; }
    .active { display: block; }
    .nav-green { color: #22c55e; }
  </style>
</head>
<body class="text-slate-800">

<!-- Auth Section -->
<div id="authPage" class="p-6 max-w-md mx-auto">
  <div class="flex justify-between items-center mb-10">
    <h1 class="text-2xl font-bold text-blue-900">Lifecare</h1>
    <button onclick="document.getElementById('loginView').classList.toggle('hidden'); document.getElementById('regView').classList.toggle('hidden');" class="text-xs font-bold text-blue-600 border border-blue-600 px-3 py-1 rounded-full">REGISTER</button>
  </div>

  <div id="loginView" class="space-y-4">
    <input type="email" id="lEmail" placeholder="Work Email" class="w-full p-4 border rounded-xl bg-slate-50 outline-none">
    <input type="password" id="lPass" placeholder="Password" class="w-full p-4 border rounded-xl bg-slate-50 outline-none">
    <button onclick="handleLogin()" class="w-full bg-blue-500 text-white p-4 rounded-xl font-bold">LOG IN</button>
  </div>

  <div id="regView" class="hidden space-y-4">
    <input type="text" id="rID" placeholder="Employee ID" class="w-full p-4 border rounded-xl outline-none">
    <input type="email" id="rEmail" placeholder="Work Email" class="w-full p-4 border rounded-xl outline-none">
    <input type="password" id="rPass" placeholder="Set Password" class="w-full p-4 border rounded-xl outline-none">
    <button onclick="handleRegister()" class="w-full bg-green-500 text-white p-4 rounded-xl font-bold">REGISTER PASSWORD</button>
  </div>
</div>

<!-- Main App -->
<div id="app" class="hidden min-h-screen flex flex-col">
  <header class="lc-blue p-4 text-center sticky top-0 shadow-sm">
    <h2 id="tabTitle" class="font-bold text-blue-800 uppercase text-xs">Home</h2>
  </header>

  <main class="flex-grow p-4">
    <!-- Home -->
    <div id="t-home" class="tab-content active text-center pt-10">
      <div class="bg-blue-50 p-4 rounded-xl mb-10">
        <p id="geoText" class="text-[10px] font-bold text-slate-400">WAITING FOR GPS...</p>
      </div>
      <button id="btnIn" disabled class="w-full py-16 bg-slate-200 text-white text-3xl font-black rounded-3xl mb-4">CLOCK IN</button>
      <button id="btnOut" disabled class="w-full py-16 bg-slate-200 text-white text-3xl font-black rounded-3xl">CLOCK OUT</button>
    </div>

    <!-- Bio -->
    <div id="t-bio" class="tab-content">
      <h1 id="userName" class="text-3xl font-black text-blue-900 mb-6"></h1>
      <div class="space-y-4">
        <div class="p-4 bg-slate-50 rounded-xl border">
          <h4 class="text-blue-500 font-bold text-[10px] uppercase mb-2">Personal</h4>
          <div id="bioPersonal" class="text-xs space-y-1"></div>
        </div>
        <div class="p-4 bg-slate-50 rounded-xl border">
          <h4 class="text-blue-500 font-bold text-[10px] uppercase mb-2">Employment</h4>
          <div id="bioEmployment" class="text-xs space-y-1"></div>
        </div>
      </div>
    </div>
  </main>

  <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 pb-6">
    <button onclick="showTab('home')" class="text-center"><i class="fa fa-home nav-green block text-xl"></i><span class="text-[8px] font-bold">HOME</span></button>
    <button onclick="showTab('bio')" class="text-center"><i class="fa fa-user nav-green block text-xl"></i><span class="text-[8px] font-bold">BIO</span></button>
  </nav>
</div>

<script>
  let userData = {};

  function showTab(t) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('t-' + t).classList.add('active');
    document.getElementById('tabTitle').innerText = t;
  }

  function handleLogin() {
    const email = document.getElementById('lEmail').value;
    const pass = document.getElementById('lPass').value;
    google.script.run.withSuccessHandler(res => {
      if(res.success) {
        userData = res;
        document.getElementById('authPage').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        renderData();
      } else { alert(res.message); }
    }).handleAction({action:'login', email:email, password:pass});
  }

  function renderData() {
    document.getElementById('userName').innerText = userData.name;
    document.getElementById('bioPersonal').innerHTML = `
      <p><b>ID:</b> ${userData.id}</p>
      <p><b>Email:</b> ${userData.email}</p>
      <p><b>Phone:</b> ${userData.phone}</p>
      <p><b>Gender:</b> ${userData.gender}</p>`;
    document.getElementById('bioEmployment').innerHTML = `
      <p><b>Dept:</b> ${userData.dept}</p>
      <p><b>Designation:</b> ${userData.desig}</p>
      <p><b>Type:</b> ${userData.empType}</p>
      <p><b>Role:</b> ${userData.role}</p>`;
  }
</script>
</body>
</html>
