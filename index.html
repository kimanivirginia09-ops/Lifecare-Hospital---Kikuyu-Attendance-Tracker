<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecare Kikuyu Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --lc-blue: #f0f9ff; --lc-header: #bae6fd; --lc-green: #22c55e; --lc-grey: #94a3b8; }
        body { background-color: white; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        .header-bg { background-color: var(--lc-header); border-bottom: 1px solid #93c5fd; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--lc-grey); width: 14%; cursor: pointer; }
        .nav-btn.active { color: var(--lc-green); font-weight: bold; }
        .nav-btn svg { fill: currentColor; width: 22px; height: 22px; margin-bottom: 4px; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; padding: 20px; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .btn-primary { background-color: var(--lc-green); color: white; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; }
        .btn-inactive { background-color: #cbd5e1 !important; color: #64748b !important; cursor: not-allowed; }
        .input-field { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 600px; }
        th { background: var(--lc-header); padding: 8px; border: 1px solid #93c5fd; }
        td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; }
    </style>
</head>
<body>

    <div id="authSection" class="p-8 max-w-md mx-auto min-h-screen flex flex-col justify-center relative">
        <div class="flex justify-end gap-3 absolute top-6 right-6">
            <button onclick="showReg()" class="text-[10px] font-bold text-blue-600 border border-blue-200 px-3 py-1 rounded">REGISTER</button>
            <button onclick="adminAccessPrompt()" class="text-[10px] font-bold text-slate-400 border border-slate-200 px-3 py-1 rounded">ADMIN ACCESS</button>
        </div>

        <div id="loginBox">
            <h1 class="text-center text-2xl font-black text-blue-500 mb-8 uppercase">Lifecare Kikuyu</h1>
            <input type="email" id="lEmail" placeholder="Email" class="input-field">
            <input type="password" id="lPass" placeholder="Password" class="input-field">
            <button id="loginBtn" onclick="handleLogin()" class="btn-primary">LOG IN</button>
        </div>

        <div id="regBox" class="hidden text-center">
            <h2 class="font-bold mb-6">STAFF REGISTRATION</h2>
            <input type="text" id="rId" placeholder="Employee ID" class="input-field">
            <input type="email" id="rEmail" placeholder="Work Email" class="input-field">
            <input type="password" id="rPass" placeholder="Create Password" class="input-field">
            <button id="regBtn" onclick="handleRegister()" class="btn-primary">SAVE PASSWORD</button>
            <p onclick="showLogin()" class="mt-4 text-xs text-blue-500 cursor-pointer">Back to Login</p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="header-bg p-4 sticky top-0 flex justify-between items-center z-50">
            <span class="font-bold text-blue-800 text-xs">KIKUYU STAFF PORTAL</span>
            <button onclick="location.reload()" class="text-[10px] font-bold text-red-500 uppercase">Logout</button>
        </header>

        <main>
            <div id="t-home" class="tab-content active text-center py-20">
                <div class="glass-card max-w-xs mx-auto">
                    <p id="locLabel" class="text-[10px] font-bold text-red-400 mb-6 uppercase">Checking Hospital Vicinity...</p>
                    <button id="btnIn" onclick="clock('IN')" class="btn-primary py-12 text-2xl btn-inactive" disabled>CLOCK IN</button>
                    <button id="btnOut" onclick="clock('OUT')" class="btn-primary py-12 text-2xl btn-inactive hidden" disabled>CLOCK OUT</button>
                </div>
            </div>

            <div id="t-logs" class="tab-content">
                <h3 class="font-bold text-blue-600 mb-4 text-[10px] uppercase">Attendance Logs (24Hr)</h3>
                <div class="overflow-x-auto glass-card p-0">
                    <table>
                        <thead>
                            <tr><th>Date</th><th>Status</th><th>In</th><th>Out</th><th>Total</th></tr>
                        </thead>
                        <tbody id="logsBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="t-bio" class="tab-content">
                <h1 id="bName" class="text-3xl font-black mb-6 uppercase"></h1>
                <div class="glass-card mb-4">
                    <p class="text-[10px] font-bold text-blue-500 border-b pb-2 mb-4 uppercase">Personal Details</p>
                    <div id="bioPersonal" class="space-y-3 text-sm"></div>
                </div>
                <div class="glass-card">
                    <p class="text-[10px] font-bold text-blue-500 border-b pb-2 mb-4 uppercase">Employment Details</p>
                    <div id="bioEmployment" class="space-y-3 text-sm"></div>
                </div>
            </div>
            
            </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
            <div onclick="nav('home')" class="nav-btn active" id="n-home"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</div>
            <div onclick="nav('logs')" class="nav-btn" id="n-logs"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>Logs</div>
            <div onclick="nav('bio')" class="nav-btn" id="n-bio"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Bio</div>
        </nav>
    </div>

    <script>
        // CRITICAL: Ensure this URL ends in /exec
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycby54HfJj8c5Up4swSXRV5YhPP5y5g-lQj8OhPLSzDDcuKOnlaDgYJZfPveAlHo-XVMn_Q/exec";
        let user = null;
        let isClockedIn = false;

        function showReg() { document.getElementById('loginBox').classList.add('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { document.getElementById('loginBox').classList.remove('hidden'); document.getElementById('regBox').classList.add('hidden'); }

        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('lEmail').value;
            const pass = document.getElementById('lPass').value;
            
            if(!email || !pass) return alert("Please enter email and password");
            
            btn.innerText = "CONNECTING...";
            btn.disabled = true;

            try {
                const resp = await fetch(`${CLOUD_URL}?action=login&email=${email}&pass=${pass}`);
                const res = await resp.json();
                
                if(res.success) {
                    user = res.data;
                    document.getElementById('authSection').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    loadBio();
                    startGps();
                } else {
                    alert("Login Refused. Check your email/password in the sheet.");
                    btn.innerText = "LOG IN";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Connection Error. Is your Google Script deployed as 'Anyone'?");
                btn.innerText = "LOG IN";
                btn.disabled = false;
            }
        }

        function loadBio() {
            document.getElementById('bName').innerText = user.Name;
            document.getElementById('bioPersonal').innerHTML = `
                <div class="flex justify-between"><span>ID</span><b>${user.ID}</b></div>
                <div class="flex justify-between"><span>Email</span><b>${user.Email}</b></div>
                <div class="flex justify-between"><span>Phone</span><b>${user.Phone || '---'}</b></div>`;
            document.getElementById('bioEmployment').innerHTML = `
                <div class="flex justify-between"><span>Dept</span><b>${user.Department}</b></div>
                <div class="flex justify-between"><span>Type</span><b>${user.EmpType}</b></div>`;
        }

        function startGps() {
            navigator.geolocation.getCurrentPosition(() => {
                document.getElementById('locLabel').innerText = "HOSPITAL RANGE: OK";
                document.getElementById('locLabel').style.color = "green";
                document.getElementById('btnIn').disabled = false;
                document.getElementById('btnIn').classList.remove('btn-inactive');
            });
        }

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('t-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }
    </script>
</body>
</html>
