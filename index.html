<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecare Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Colors based on your description */
        .lc-blue { background-color: #bae6fd; } /* Light Blue Header */
        .lc-green { color: #22c55e; } /* Green Bottom Icons */
        .tab-content { display: none; padding: 20px; padding-bottom: 120px; }
        .tab-content.active { display: block; }
        .btn-inactive { background-color: #cbd5e1 !important; cursor: not-allowed; opacity: 0.6; }
        .nav-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-white font-sans text-slate-800">

<div id="authPage" class="p-8 max-w-md mx-auto mt-10">
    <div class="flex justify-between items-start mb-10">
        <h1 class="text-3xl font-black text-slate-800">LIFECARE</h1>
        <div class="flex gap-2">
            <button onclick="toggleAuth(true)" class="text-[10px] font-bold text-blue-600 border border-blue-200 px-3 py-1 rounded-full uppercase">Register</button>
            <button onclick="adminPrompt()" class="text-[10px] font-bold text-slate-400 border border-slate-200 px-3 py-1 rounded-full uppercase">Admin</button>
        </div>
    </div>

    <div id="loginView">
        <input type="email" id="lEmail" placeholder="Work Email" class="w-full p-4 mb-4 border rounded-xl bg-slate-50 outline-none focus:border-blue-400">
        <input type="password" id="lPass" placeholder="Password" class="w-full p-4 mb-8 border rounded-xl bg-slate-50 outline-none focus:border-blue-400">
        <button onclick="handleLogin()" class="w-full bg-blue-500 text-white p-4 rounded-xl font-bold uppercase tracking-widest">Log In</button>
    </div>

    <div id="regView" class="hidden">
        <p class="text-xs font-bold mb-4 text-blue-500 uppercase">New User Registration</p>
        <input type="text" id="rId" placeholder="Employee ID" class="w-full p-4 mb-3 border rounded-xl bg-slate-50 outline-none">
        <input type="password" id="rPass" placeholder="Choose Password" class="w-full p-4 mb-6 border rounded-xl bg-slate-50 outline-none">
        <button onclick="handleReg()" class="w-full bg-green-500 text-white p-4 rounded-xl font-bold uppercase">Save Password</button>
        <button onclick="toggleAuth(false)" class="w-full text-xs text-slate-400 mt-4 uppercase text-center block">Back to Login</button>
    </div>
</div>

<div id="portalApp" class="hidden">
    <header class="lc-blue p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <h2 class="font-black text-blue-900 text-sm">LIFECARE KIKUYU</h2>
        <button onclick="location.reload()" class="text-[10px] font-bold text-blue-700 uppercase">Logout</button>
    </header>

    <main>
        <div id="t-home" class="tab-content active text-center py-20">
            <p id="gpsLabel" class="text-red-500 font-bold text-[10px] mb-10 tracking-widest uppercase italic">Verifying Location...</p>
            <div class="space-y-4 px-6">
                <button id="btnIn" onclick="clock('IN')" class="w-full py-16 rounded-3xl bg-green-500 text-white text-3xl font-black btn-inactive" disabled>CLOCK IN</button>
                <button id="btnOut" onclick="clock('OUT')" class="w-full py-16 rounded-3xl bg-blue-600 text-white text-3xl font-black hidden">CLOCK OUT</button>
            </div>
        </div>

        <div id="t-logs" class="tab-content">
            <h3 class="font-bold mb-4 uppercase text-xs">Attendance History (24Hr)</h3>
            <div class="bg-slate-50 p-4 rounded-xl text-xs text-center text-slate-400 italic border border-dashed border-slate-200">
                Calendar View and Date-wise reports will appear here.
            </div>
        </div>

        <div id="t-leave" class="tab-content space-y-4">
            <h
