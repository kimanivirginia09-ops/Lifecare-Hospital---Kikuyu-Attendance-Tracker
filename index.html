<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecare Hospital Kikuyu - Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --lc-blue: #e0f2fe; --lc-green: #22c55e; }
        body { background: #ffffff; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        .header-bg { background-color: var(--lc-blue); border-bottom: 1px solid #bae6fd; }
        .nav-btn.active { color: var(--lc-green); font-weight: bold; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        .btn-primary { background-color: var(--lc-green); color: white; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; }
        .input-field { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; margin-bottom: 12px; background: #f8fafc; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: var(--lc-blue); padding: 10px; border: 1px solid #bae6fd; }
        td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-600"></div>
        <p class="mt-2 text-xs font-bold text-slate-500">Syncing Brain...</p>
    </div>

    <div id="mainApp">
        <header class="header-bg p-4 flex justify-between items-center">
            <span class="font-black text-blue-700">KIKUYU STAFF PORTAL</span>
            <button onclick="logout()" class="text-[10px] font-bold text-red-500 uppercase">Logout</button>
        </header>

        <main>
            <div id="t-bio" class="tab-content">
                <h1 id="bName" class="text-2xl font-black text-slate-800 mb-6 uppercase"></h1>
                <div class="glass-card p-5">
                    <p class="text-[10px] font-bold text-blue-500 mb-4 border-b pb-1">PERSONAL DETAILS</p>
                    <div id="bioPersonal" class="space-y-2 text-sm"></div>
                </div>
                <div class="glass-card p-5 mt-4">
                    <p class="text-[10px] font-bold text-blue-500 mb-4 border-b pb-1">EMPLOYMENT DETAILS</p>
                    <div id="bioEmployment" class="space-y-2 text-sm"></div>
                </div>
            </div>

            <div id="t-reports" class="tab-content">
                <h3 class="font-bold text-blue-600 mb-2 text-xs">TOTAL WORK DURATION SUMMARY</h3>
                <div class="overflow-x-auto glass-card mb-6"><table id="repSumm"></table></div>
                <h3 class="font-bold text-blue-600 mb-2 text-xs">DATE-WISE ATTENDANCE REPORT</h3>
                <div class="overflow-x-auto glass-card"><table id="repDate"></table></div>
            </div>

            <div id="t-settings" class="tab-content">
                <h3 class="font-bold text-blue-600 mb-4 text-xs uppercase">Geofencing</h3>
                <div class="glass-card p-6">
                    <input id="sLat" placeholder="Latitude" class="input-field">
                    <input id="sLon" placeholder="Longitude" class="input-field">
                    <input id="sRad" placeholder="Radius (M)" class="input-field">
                    <button onclick="saveSettings()" class="btn-primary">SAVE SETTINGS</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const CLOUD_URL = "YOUR_APPS_SCRIPT_URL";
        let user;

        function startApp(d) {
            user = d;
            document.getElementById('bName').innerText = d.name;
            
            // FIXED BIO MAPPING (Matches Sheet Column Order)
            document.getElementById('bioPersonal').innerHTML = `
                <div class="flex justify-between"><span>Employee ID:</span><b>${d.id}</b></div>
                <div class="flex justify-between"><span>Department:</span><b>${d.dept}</b></div>
                <div class="flex justify-between"><span>Designation:</span><b>${d.desig}</b></div>
                <div class="flex justify-between"><span>Email:</span><b>${d.email}</b></div>
                <div class="flex justify-between"><span>Phone Number:</span><b>${d.phone}</b></div>
                <div class="flex justify-between"><span>Gender:</span><b>${d.gender}</b></div>
                <div class="flex justify-between"><span>Date of Birth:</span><b>${d.dob}</b></div>`;
            
            document.getElementById('bioEmployment').innerHTML = `
                <div class="flex justify-between"><span>Manager Name:</span><b>${d.manager}</b></div>
                <div class="flex justify-between"><span>Employee Type:</span><b>${d.empType}</b></div>`;

            fetchSettings(); // Load geofencing data immediately
        }

        // FIXED DOCUMENT UPLOAD
        async function handleDocUpload(type) {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async (f) => {
                    const base64 = f.target.result.split(',')[1];
                    setLoading(true);
                    try {
                        const res = await fetch(CLOUD_URL, {
                            method: 'POST',
                            mode: 'no-cors', // Use no-cors if receiving generic errors
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({ base64, type: file.type, name: file.name, docType: type, emp: user.name })
                        });
                        alert("Upload processed. Check your Drive.");
                    } catch (err) {
                        alert("Upload Failed: " + err);
                    }
                    setLoading(false);
                };
                reader.readAsDataURL(file);
            };
            fileInput.click();
        }

        // FIXED GEOFENCING LOAD
        function fetchSettings() {
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=get_settings&callback=hSet`;
            document.body.appendChild(s);
        }
        window.hSet = (d) => {
            document.getElementById('sLat').value = d.lat || "";
            document.getElementById('sLon').value = d.lon || "";
            document.getElementById('sRad').value = d.rad || "";
        };

        // FIXED ADMIN REPORTS
        function fetchReports() {
            setLoading(true);
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=get_admin_reports&callback=hRep`;
            document.body.appendChild(s);
        }
        window.hRep = (d) => {
            setLoading(false);
            const summ = document.getElementById('repSumm');
            const dateRep = document.getElementById('repDate');
            
            summ.innerHTML = `<tr><th>ID</th><th>Name</th><th>Dept</th><th>P</th><th>A</th><th>L</th></tr>` + 
                d.data.map(r => `<tr><td>${r.id}</td><td>${r.name}</td><td>${r.dept}</td><td>${r.p}</td><td>${r.a}</td><td>${r.l}</td></tr>`).join('');
            
            dateRep.innerHTML = `<tr><th>ID</th><th>Name</th><th>Total Hours</th><th>Avg Hours</th></tr>` +
                d.data.map(r => `<tr><td>${r.id}</td><td>${r.name}</td><td>${r.totalHrs}</td><td>${r.avgHrs}</td></tr>`).join('');
        };

        function setLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
    </script>
</body>
</html>
