<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding-bottom: 90px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #94a3b8; transition: all 0.3s; }
        .nav-btn.active { color: #2dd4bf; transform: translateY(-2px); }
        table { border-collapse: collapse; width: 100%; font-size: 10px; margin-top: 10px; }
        th, td { border: 1px solid #334155; padding: 6px; text-align: center; }
        th { background: #1e293b; color: #2dd4bf; }
        .status-P { color: #2dd4bf; font-weight: bold; }
        .status-A { color: #f43f5e; font-weight: bold; }
        .status-W { color: #64748b; }
    </style>
</head>
<body>

    <div id="authSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl">
            <h1 class="text-3xl font-bold text-teal-500 text-center mb-6 tracking-tighter">LIFECARE</h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-teal-500 text-white">
                <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-teal-500 text-white">
                <button id="loginBtn" onclick="runAuth()" class="w-full bg-teal-600 p-4 rounded-2xl font-bold hover:bg-teal-500 transition-all">LOG IN</button>
                <button onclick="openAdminPrompt()" class="w-full text-slate-600 text-[10px] uppercase tracking-widest hover:text-teal-500">Admin Access</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-50">
            <h2 id="pageTitle" class="text-xl font-bold text-teal-400 uppercase">Dashboard</h2>
            <button onclick="logout()" class="text-rose-500 text-[10px] border border-rose-900/30 px-2 py-1 rounded">LOGOUT</button>
        </div>

        <div id="content" class="p-4 space-y-6">
            <div id="page-home" class="page-view space-y-6">
                <div class="glass p-8 rounded-3xl text-center">
                    <p id="userNameDisplay" class="text-lg font-bold text-white mb-2"></p>
                    <p id="locStatus" class="text-slate-500 text-xs mb-6 italic">GPS verification active</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="clockAction('IN')" class="bg-emerald-600 p-8 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-emerald-900/20">CLOCK IN</button>
                        <button onclick="clockAction('OUT')" class="bg-rose-600 p-8 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-rose-900/20">CLOCK OUT</button>
                    </div>
                </div>
            </div>

            <div id="page-bio" class="page-view hidden space-y-4">
                <div class="glass p-6 rounded-3xl space-y-4">
                    <p class="text-xs text-slate-500 border-b border-slate-800 pb-2 uppercase tracking-wide">Staff ID: <span id="bio-id" class="text-white font-bold ml-2"></span></p>
                    <p class="text-xs text-slate-500 border-b border-slate-800 pb-2 uppercase tracking-wide">Dept: <span id="bio-dept" class="text-white font-bold ml-2"></span></p>
                    <p class="text-xs text-slate-500 uppercase tracking-wide">Title: <span id="bio-desig" class="text-white font-bold ml-2"></span></p>
                </div>
            </div>

            <div id="page-leave" class="page-view hidden glass p-6 rounded-3xl space-y-4">
                <h3 class="text-teal-400 font-bold border-b border-slate-800 pb-2 text-sm">KENYAN LAWFUL LEAVE</h3>
                <select id="leaveType" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-white outline-none">
                    <option>Annual Leave (21 Days)</option>
                    <option>Sick Leave</option>
                    <option>Maternity Leave (90 Days)</option>
                    <option>Paternity Leave (14 Days)</option>
                    <option>Compassionate Leave</option>
                </select>
                <input type="date" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-white outline-none">
                <button onclick="alert('Leave Request Logged')" class="w-full bg-teal-600 p-4 rounded-xl font-bold">SUBMIT REQUEST</button>
            </div>

            <div id="page-admin" class="page-view hidden space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-teal-400 font-bold mb-4">MONTHLY ATTENDANCE REPORT</h3>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <select id="rptMonth" class="bg-slate-900 border border-slate-700 p-2 rounded text-xs text-white">
                            <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                            <option value="3" selected>April</option><option value="4">May</option><option value="5">June</option>
                            <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                            <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                        </select>
                        <select id="rptYear" class="bg-slate-900 border border-slate-700 p-2 rounded text-xs text-white">
                            <option value="2026" selected>2026</option><option value="2025">2025</option>
                        </select>
                        <button onclick="generateReport()" class="bg-teal-600 px-4 py-2 rounded text-xs font-bold">GENERATE</button>
                    </div>
                    <div class="overflow-x-auto" id="reportContainer">
                        <div id="reportOutput" class="text-slate-400 text-[10px] italic">Select a month and click generate.</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-800 p-4 flex justify-around items-center backdrop-blur-md">
            <button onclick="nav('home')" class="nav-btn active" id="nav-home"><span>🏠</span>Home</button>
            <button onclick="nav('bio')" class="nav-btn" id="nav-bio"><span>👤</span>Bio</button>
            <button onclick="nav('leave')" class="nav-btn" id="nav-leave"><span>✈️</span>Leave</button>
            <button id="adminNav" onclick="nav('admin')" class="nav-btn hidden"><span>📊</span>Reports</button>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzu4ZJyeifn_CEIKWJgpl39oxscN1VQbxqAU6a9TDfPLJa0120sJ-IDopfJJQ9N_K-NiA/exec";
        let currentUser = null;

        // SESSION PERSISTENCE
        window.onload = function() {
            const saved = localStorage.getItem('lifecare_user');
            if(saved) {
                currentUser = JSON.parse(saved);
                showApp(currentUser);
            }
        };

        function runAuth() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Enter credentials");
            document.getElementById('loginBtn').innerText = "VERIFYING...";
            const script = document.createElement('script');
            script.src = `${CLOUD_URL}?action=check_auth&email=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}&callback=handleAuth`;
            document.body.appendChild(script);
        }

        window.handleAuth = function(data) {
            document.getElementById('loginBtn').innerText = "LOG IN";
            if(data.exists && data.savedPass === document.getElementById('pass').value) {
                currentUser = data;
                localStorage.setItem('lifecare_user', JSON.stringify(data));
                showApp(data);
            } else { alert("Authentication Failed"); }
        }

        function showApp(data) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = data.name;
            document.getElementById('bio-id').innerText = data.id;
            document.getElementById('bio-dept').innerText = data.dept;
            document.getElementById('bio-desig').innerText = data.desig;
        }

        function clockAction(type) {
            document.getElementById('locStatus').innerText = "Checking GPS...";
            navigator.geolocation.getCurrentPosition(p => {
                const loc = `${p.coords.latitude.toFixed(5)},${p.coords.longitude.toFixed(5)}`;
                const script = document.createElement('script');
                script.src = `${CLOUD_URL}?action=clock_action&id=${currentUser.id}&name=${encodeURIComponent(currentUser.name)}&desig=${encodeURIComponent(currentUser.desig)}&dept=${encodeURIComponent(currentUser.dept)}&type=${type}&location=${loc}&callback=handleClock`;
                document.body.appendChild(script);
            }, () => {
                alert("GPS error. Please enable location.");
                document.getElementById('locStatus').innerText = "GPS verification active";
            });
        }

        window.handleClock = function(data) {
            alert(`Success! ${data.type} recorded at ${data.time}`);
            location.reload();
        }

        function generateReport() {
            const m = document.getElementById('rptMonth').value;
            const y = document.getElementById('rptYear').value;
            document.getElementById('reportOutput').innerText = "Computing report data...";
            const script = document.createElement('script');
            script.src = `${CLOUD_URL}?action=get_report&month=${m}&year=${y}&callback=handleReport`;
            document.body.appendChild(script);
        }

        window.handleReport = function(data) {
            let html = `<table><thead><tr><th>Staff Name</th>`;
            for(let d=1; d<=data.daysCount; d++) html += `<th>${d}</th>`;
            html += `<th>P</th><th>A</th><th>W</th></tr></thead><tbody>`;
            
            data.report.forEach(row => {
                html += `<tr><td class="text-left whitespace-nowrap">${row.name}</td>`;
                row.days.forEach(day => {
                    html += `<td class="status-${day}">${day}</td>`;
                });
                html += `<td class="bg-teal-900/20 font-bold">${row.totalP}</td>`;
                html += `<td class="bg-rose-900/20 font-bold">${row.totalA}</td>`;
                html += `<td class="bg-slate-800/50">${row.totalW}</td></tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('reportOutput').innerHTML = html;
        }

        function nav(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+id).classList.remove('hidden');
            document.getElementById('nav-'+id).classList.add('active');
            document.getElementById('pageTitle').innerText = id.toUpperCase();
        }

        function openAdminPrompt() {
            if(prompt("Enter Admin PIN:") === "1201") {
                document.getElementById('adminNav').classList.remove('hidden');
                nav('admin');
            }
        }

        function logout() {
            localStorage.removeItem('lifecare_user');
            location.reload();
        }
    </script>
</body>
</html>
