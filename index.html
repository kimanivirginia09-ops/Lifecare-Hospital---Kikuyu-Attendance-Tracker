<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftGuard Advanced | LifeCare Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white flex items-center justify-center p-4">

    <div class="glass max-w-md w-full rounded-2xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight">LIFECARE HOSPITAL</h1>
            <p class="text-slate-400 text-sm">Secure Personnel Portal</p>
        </div>

        <div id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium uppercase tracking-wider mb-1 text-slate-400">Employee ID (5 Digits)</label>
                <input type="number" id="empID" maxlength="5" oninput="javascript: if (this.value.length > this.maxLength) this.value = this.value.slice(0, this.maxLength);"
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-xl font-mono outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-medium uppercase tracking-wider mb-1 text-slate-400">Password</label>
                <input type="password" id="empPass" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-xl outline-none focus:border-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-4 pt-2">
                <button onclick="processAction('CLOCK_IN')" class="bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold transition">CLOCK IN</button>
                <button onclick="processAction('CLOCK_OUT')" class="bg-rose-600 hover:bg-rose-500 py-4 rounded-xl font-bold transition">CLOCK OUT</button>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-slate-800">
            <button id="adminBtn" onclick="toggleAdmin()" class="text-slate-500 text-xs hover:text-white transition w-full">ADMIN ACCESS</button>
            
            <div id="adminPanel" class="hidden mt-4 space-y-4 bg-slate-800/50 p-4 rounded-lg">
                <p class="text-xs font-bold text-blue-400">ONBOARD NEW STAFF</p>
                <input type="number" id="newID" placeholder="New 5-Digit ID" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm">
                <input type="password" id="newPass" placeholder="Set Password" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm">
                <button onclick="onboardStaff()" class="w-full bg-blue-600 text-xs py-2 rounded">REGISTER STAFF</button>
                <hr class="border-slate-700">
                <button onclick="downloadLogs()" class="w-full bg-slate-700 text-xs py-2 rounded">DOWNLOAD PAYROLL CSV</button>
            </div>
        </div>

        <div id="statusBox" class="hidden mt-6 rounded-lg p-4 text-sm text-center"></div>
    </div>

    <script>
        const HOSPITAL_LAT = -1.2448624;
        const HOSPITAL_LON = 36.6619612;
        const RADIUS = 150; 
        const ADMIN_MASTER_KEY = "12345"; // Change this to your secret admin password!

        // Load data from storage
        let staffDatabase = JSON.parse(localStorage.getItem('staffDB')) || {}; 
        let attendanceLogs = JSON.parse(localStorage.getItem('logs')) || [];

        function processAction(type) {
            const id = document.getElementById('empID').value;
            const pass = document.getElementById('empPass').value;

            // 1. Validate ID Length
            if (id.length !== 5) {
                return showStatus("Error: ID must be exactly 5 digits.", "bg-rose-900/50 text-rose-200");
            }

            // 2. Check if onboarded
            if (!staffDatabase[id]) {
                return showStatus("Access Denied: ID not onboarded in system.", "bg-rose-900/50 text-rose-200");
            }

            // 3. Check Password
            if (staffDatabase[id] !== pass) {
                return showStatus("Error: Incorrect Password.", "bg-rose-900/50 text-rose-200");
            }

            // 4. GPS Check
            showStatus("Verifying Location...", "bg-blue-900/50 text-blue-200");
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, HOSPITAL_LAT, HOSPITAL_LON);
                
                if (dist > RADIUS) {
                    showStatus(`Denied: You are ${Math.round(dist)}m from Hospital.`, "bg-rose-900/50 text-rose-200");
                } else {
                    const log = { id, time: new Date().toLocaleString(), type, loc: `${pos.coords.latitude.toFixed(4)},${pos.coords.longitude.toFixed(4)}` };
                    attendanceLogs.push(log);
                    localStorage.setItem('logs', JSON.stringify(attendanceLogs));
                    showStatus(`${type} SUCCESSFUL`, "bg-emerald-900/50 text-emerald-200");
                    document.getElementById('empPass').value = '';
                }
            }, () => showStatus("Error: Enable GPS.", "bg-rose-900/50 text-rose-200"));
        }

        function onboardStaff() {
            const nID = document.getElementById('newID').value;
            const nPass = document.getElementById('newPass').value;
            if(nID.length === 5 && nPass) {
                staffDatabase[nID] = nPass;
                localStorage.setItem('staffDB', JSON.stringify(staffDatabase));
                alert("Staff ID " + nID + " successfully onboarded!");
                document.getElementById('newID').value = '';
                document.getElementById('newPass').value = '';
            } else {
                alert("Invalid Onboarding Data");
            }
        }

        function toggleAdmin() {
            const key = prompt("Enter Admin Master Password:");
            if (key === ADMIN_MASTER_KEY) {
                document.getElementById('adminPanel').classList.toggle('hidden');
            } else {
                alert("Unauthorized!");
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function showStatus(msg, cls) {
            const b = document.getElementById('statusBox');
            b.className = `mt-6 rounded-lg p-4 text-sm text-center ${cls}`;
            b.innerHTML = msg;
            b.classList.remove('hidden');
        }

        function downloadLogs() {
            let csv = "ID,Time,Action,GPS\n";
            attendanceLogs.forEach(l => csv += `${l.id},${l.time},${l.type},${l.loc}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'LifeCare_Payroll.csv';
            a.click();
        }
    </script>
</body>
</html>
