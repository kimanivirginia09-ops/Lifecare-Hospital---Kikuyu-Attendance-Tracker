<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecare Hospital Kikuyu - Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --lc-blue: #e0f2fe; --lc-green: #22c55e; }
        body { background: #ffffff; color: #1e293b; font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        .header-bg { background-color: var(--lc-blue); border-bottom: 1px solid #bae6fd; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #94a3b8; width: 12%; cursor: pointer; }
        .nav-btn.active { color: var(--lc-green); font-weight: bold; }
        .nav-btn svg { fill: currentColor; width: 22px; height: 22px; margin-bottom: 4px; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        .btn-primary { background-color: var(--lc-green); color: white; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; }
        .btn-inactive { background-color: #cbd5e1 !important; color: #64748b !important; cursor: not-allowed; }
        .input-field { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; margin-bottom: 12px; background: #f8fafc; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 600px; }
        th { background: var(--lc-blue); color: #0369a1; padding: 10px; border: 1px solid #bae6fd; text-transform: uppercase; }
        td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loader"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-600"></div><p class="mt-2 text-xs font-bold text-slate-500">Syncing Brain...</p></div>

    <div id="authSection" class="p-6 max-w-md mx-auto min-h-screen flex flex-col justify-center">
        <div id="loginBox">
            <h1 class="text-center text-3xl font-black text-blue-500 mb-8">LIFECARE HOSPITAL</h1>
            <input type="email" id="lEmail" placeholder="Email" class="input-field">
            <input type="password" id="lPass" placeholder="Password" class="input-field">
            <button onclick="doLogin()" class="btn-primary mt-2">LOGIN</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="header-bg p-4 sticky top-0 flex justify-between items-center z-50">
            <span class="font-black text-blue-700 uppercase">Kikuyu Staff Portal</span>
            <button onclick="logout()" class="text-[10px] font-bold text-red-500">LOGOUT</button>
        </header>

        <main>
            <div id="t-bio" class="tab-content active">
                <h1 id="bName" class="text-3xl font-black text-slate-800 mb-8 uppercase"></h1>
                
                <div class="glass-card p-5 mb-4">
                    <p class="text-[10px] font-bold text-blue-500 border-b pb-2 mb-4 uppercase">Personal Details</p>
                    <div id="bioPersonal" class="space-y-3 text-sm"></div>
                </div>

                <div class="glass-card p-5">
                    <p class="text-[10px] font-bold text-blue-500 border-b pb-2 mb-4 uppercase">Employment Details</p>
                    <div id="bioEmployment" class="space-y-3 text-sm"></div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex justify-around items-center z-50">
            <div onclick="nav('bio')" class="nav-btn active" id="n-bio"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Bio</div>
        </nav>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycby54HfJj8c5Up4swSXRV5YhPP5y5g-lQj8OhPLSzDDcuKOnlaDgYJZfPveAlHo-XVMn_Q/exec";
        let user;

        function setLoading(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        
        function doLogin() {
            setLoading(true);
            const email = document.getElementById('lEmail').value;
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=check_auth&email=${encodeURIComponent(email)}&callback=hAuth`;
            document.body.appendChild(s);
        }

        window.hAuth = (d) => {
            setLoading(false);
            if (d.exists && d.pass == document.getElementById('lPass').value) {
                user = d;
                startApp(d);
            } else alert("Login Failed");
        };

        // ALIGNED STARTAPP ACCORDING TO SCREENSHOT
        function startApp(d) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('bName').innerText = d.name;
            
            // PERSONAL DETAILS SECTION
            document.getElementById('bioPersonal').innerHTML = `
                <div class="flex justify-between border-b py-2">
                    <b>Employee ID:</b> <span>${d.id}</span>
                </div>
                <div class="flex justify-between border-b py-2">
                    <b>Gender:</b> <span>${d.gender}</span>
                </div>
                <div class="flex justify-between border-b py-2">
                    <b>Date of Birth:</b> <span>${d.dob}</span>
                </div>
                <div class="flex justify-between border-b py-2">
                    <b>Email:</b> <span>${d.email}</span>
                </div>
                <div class="flex justify-between py-2">
                    <b>Phone Number:</b> <span>${d.phone}</span>
                </div>`;
            
            // EMPLOYMENT DETAILS SECTION
            document.getElementById('bioEmployment').innerHTML = `
                <div class="flex justify-between border-b py-2">
                    <b>Department:</b> <span>${d.dept}</span>
                </div>
                <div class="flex justify-between border-b py-2">
                    <b>Designation:</b> <span>${d.desig}</span>
                </div>
                <div class="flex justify-between border-b py-2">
                    <b>Manager Name:</b> <span>${d.managerId}</span>
                </div>
                <div class="flex justify-between py-2">
                    <b>Employee Type:</b> <span>${d.empType}</span>
                </div>`;
        }

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('t-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }
    </script>
</body>
</html>
