<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding-bottom: 90px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 9px; color: #94a3b8; width: 20%; }
        .nav-btn.active { color: #2dd4bf; border-top: 2px solid #2dd4bf; padding-top: 4px; }
        .btn-disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        table { border-collapse: collapse; width: 100%; font-size: 10px; }
        th, td { border: 1px solid #334155; padding: 6px; text-align: center; }
        .status-P { background: #065f46; color: #fff; font-weight: bold; border-radius: 4px; }
        .status-A { color: #f43f5e; }
        .status-W { color: #64748b; font-style: italic; }
    </style>
</head>
<body>

    <div id="authSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl">
            <h1 class="text-3xl font-bold text-teal-500 text-center mb-6">LIFECARE</h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-white">
                <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-white">
                <button id="loginBtn" onclick="runAuth()" class="w-full bg-teal-600 p-4 rounded-2xl font-bold">LOG IN</button>
                <button onclick="openAdminPrompt()" class="w-full text-slate-600 text-[10px] uppercase mt-2">Admin Panel</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-50">
            <h2 id="pageTitle" class="text-xl font-bold text-teal-400 uppercase">Home</h2>
            <button onclick="logout()" class="text-rose-500 text-[10px] border border-rose-900/30 px-2 py-1 rounded">LOGOUT</button>
        </div>

        <div id="content" class="p-4 space-y-6">
            <div id="page-home" class="page-view space-y-6 text-center">
                <div class="glass p-8 rounded-3xl">
                    <p id="userNameDisplay" class="text-lg font-bold text-white mb-2 uppercase">WELCOME</p>
                    <p id="distDisplay" class="text-[10px] text-slate-500 mb-4 italic">Locating site...</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button id="btnIn" onclick="clockAction('IN')" class="bg-emerald-600 p-8 rounded-2xl font-bold">CLOCK IN</button>
                        <button id="btnOut" onclick="clockAction('OUT')" class="bg-rose-600 p-8 rounded-2xl font-bold">CLOCK OUT</button>
                    </div>
                    <p id="rangeMsg" class="text-rose-500 text-[11px] mt-6 hidden font-semibold">⚠️ OUT OF RANGE: Action disabled.</p>
                </div>
            </div>

            <div id="page-history" class="page-view hidden space-y-6">
                <div class="glass p-4 rounded-3xl overflow-x-auto">
                    <h3 class="text-teal-400 font-bold mb-4 text-xs uppercase text-center">Monthly Summary</h3>
                    <div id="empCalendarOutput"></div>
                </div>
                <div class="glass p-4 rounded-3xl">
                    <h3 class="text-teal-400 font-bold mb-4 text-xs uppercase">Attendance Logs</h3>
                    <div id="attendanceList" class="space-y-2"></div>
                </div>
            </div>

            <div id="page-leave" class="page-view hidden glass p-6 rounded-3xl space-y-4">
                <h3 class="text-teal-400 font-bold text-sm border-b border-slate-800 pb-2 uppercase">Request Leave</h3>
                <select id="leaveType" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-white outline-none">
                    <option>Annual Leave</option>
                    <option>Sick Leave</option>
                    <option>Maternity Leave</option>
                    <option>Paternity Leave</option>
                </select>
                <input type="date" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-white">
                <button onclick="alert('Submitted')" class="w-full bg-teal-600 p-4 rounded-xl font-bold">SUBMIT</button>
            </div>

            <div id="page-bio" class="page-view hidden glass p-6 rounded-3xl space-y-4">
                <h3 class="text-teal-400 font-bold text-sm border-b border-slate-800 pb-2 uppercase">Staff Profile</h3>
                <div class="space-y-3">
                    <p class="text-xs uppercase text-slate-500">ID: <span id="bio-id" class="text-white font-bold ml-2">---</span></p>
                    <p class="text-xs uppercase text-slate-500">Dept: <span id="bio-dept" class="text-white font-bold ml-2">---</span></p>
                    <p class="text-xs uppercase text-slate-500">Title: <span id="bio-desig" class="text-white font-bold ml-2">---</span></p>
                </div>
            </div>

            <div id="page-admin" class="page-view hidden space-y-6">
                <div class="glass p-4 rounded-3xl">
                    <h3 class="text-teal-400 font-bold mb-4 text-sm uppercase">Site Settings</h3>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input id="setLat" placeholder="Lat" class="bg-slate-900 p-3 rounded-xl text-xs text-white">
                        <input id="setLon" placeholder="Lon" class="bg-slate-900 p-3 rounded-xl text-xs text-white">
                    </div>
                    <input id="setRad" placeholder="Radius (m)" class="w-full bg-slate-900 p-3 rounded-xl text-xs text-white mb-2">
                    <button onclick="saveSettings()" class="w-full bg-teal-600 p-3 rounded-xl text-xs font-bold">SAVE</button>
                </div>
                <div class="glass p-4 rounded-3xl overflow-x-auto">
                    <h3 class="text-teal-400 font-bold mb-4 text-sm">Staff Report</h3>
                    <button onclick="generateReport()" class="bg-slate-800 px-4 py-2 rounded text-[10px] mb-4 font-bold">LOAD REPORT</button>
                    <div id="adminReportOutput"></div>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center z-50">
            <button onclick="nav('home')" class="nav-btn active" id="nav-home"><span>🏠</span>Home</button>
            <button onclick="nav('history')" class="nav-btn" id="nav-history"><span>📅</span>Logs</button>
            <button onclick="nav('leave')" class="nav-btn" id="nav-leave"><span>✈️</span>Leave</button>
            <button onclick="nav('bio')" class="nav-btn" id="nav-bio"><span>👤</span>Bio</button>
            <button id="adminNav" onclick="nav('admin')" class="nav-btn hidden"><span>⚙️</span>Admin</button>
        </nav>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzu4ZJyeifn_CEIKWJgpl39oxscN1VQbxqAU6a9TDfPLJa0120sJ-IDopfJJQ9N_K-NiA/exec";
        let currentUser, config = { lat: 0, lon: 0, radius: 0 };

        window.onload = function() {
            const saved = localStorage.getItem('lifecare_user');
            if(saved) { showApp(JSON.parse(saved)); }
            fetchSettings();
        };

        function showApp(d) {
            currentUser = d;
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            // Populate all data fields instantly
            document.getElementById('userNameDisplay').innerText = `WELCOME, ${d.name}`;
            document.getElementById('bio-id').innerText = d.id;
            document.getElementById('bio-dept').innerText = d.dept;
            document.getElementById('bio-desig').innerText = d.desig;
        }

        function runAuth() {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value;
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=check_auth&email=${encodeURIComponent(e)}&password=${p}&callback=hAuth`;
            document.body.appendChild(s);
        }

        window.hAuth = function(d) {
            if(d.exists && d.savedPass === document.getElementById('pass').value) {
                localStorage.setItem('lifecare_user', JSON.stringify(d));
                showApp(d);
            } else { alert("Error"); }
        }

        function fetchSettings() {
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=get_settings&callback=hSettings`;
            document.body.appendChild(s);
        }

        window.hSettings = function(d) {
            config = d;
            document.getElementById('setLat').value = d.lat;
            document.getElementById('setLon').value = d.lon;
            document.getElementById('setRad').value = d.radius;
            checkRange();
        }

        function checkRange() {
            navigator.geolocation.getCurrentPosition(p => {
                const dist = getDistance(p.coords.latitude, p.coords.longitude, config.lat, config.lon);
                const isOut = dist > config.radius;
                document.getElementById('distDisplay').innerText = `${Math.round(dist)}m from site`;
                document.getElementById('btnIn').classList.toggle('btn-disabled', isOut);
                document.getElementById('btnOut').classList.toggle('btn-disabled', isOut);
                document.getElementById('rangeMsg').classList.toggle('hidden', !isOut);
            });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function clockAction(type) {
            navigator.geolocation.getCurrentPosition(p => {
                const loc = `${p.coords.latitude.toFixed(5)},${p.coords.longitude.toFixed(5)}`;
                const s = document.createElement('script');
                s.src = `${CLOUD_URL}?action=clock_action&id=${currentUser.id}&name=${encodeURIComponent(currentUser.name)}&desig=${encodeURIComponent(currentUser.desig)}&dept=${encodeURIComponent(currentUser.dept)}&type=${type}&location=${loc}&callback=hClock`;
                document.body.appendChild(s);
            });
        }
        window.hClock = function(d) { alert("Done"); location.reload(); }

        function nav(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+id).classList.remove('hidden');
            document.getElementById('nav-'+id).classList.add('active');
            document.getElementById('pageTitle').innerText = id.toUpperCase();
            if(id === 'history') { fetchHistory(); fetchEmployeeCalendar(); }
        }

        function fetchHistory() {
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=get_history&id=${currentUser.id}&callback=hHist`;
            document.body.appendChild(s);
        }
        window.hHist = function(d) {
            document.getElementById('attendanceList').innerHTML = d.history.map(l => 
                `<div class="p-3 bg-slate-900 rounded-xl flex justify-between text-[10px] border-l-4 ${l.type === 'IN' ? 'border-emerald-500' : 'border-rose-500'}">
                    <span>${l.type}</span><span>${l.time}</span>
                </div>`).join('');
        }

        function fetchEmployeeCalendar() {
            const m = new Date().getMonth();
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=get_report&month=${m}&year=2026&callback=hEmpCal`;
            document.body.appendChild(s);
        }

        window.hEmpCal = function(d) {
            const myRow = d.report.find(r => r.name === currentUser.name);
            if(!myRow) return;
            let h = `<table><tr>`;
            for(let i=1; i<=d.daysCount; i++) h += `<th class="bg-slate-800 text-[8px]">${i}</th>`;
            h += `</tr><tr>`;
            myRow.days.forEach(day => h += `<td class="status-${day}">${day}</td>`);
            h += `</tr></table>`;
            document.getElementById('empCalendarOutput').innerHTML = h;
        }

        function generateReport() {
            const m = new Date().getMonth();
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=get_report&month=${m}&year=2026&callback=hAdminRep`;
            document.body.appendChild(s);
        }

        window.hAdminRep = function(d) {
            let h = `<table><tr><th>Staff</th>`;
            for(let i=1; i<=d.daysCount; i++) h += `<th>${i}</th>`;
            h += `<th>P</th></tr>`;
            d.report.forEach(r => {
                h += `<tr><td class="text-left text-[8px] whitespace-nowrap">${r.name}</td>`;
                r.days.forEach(day => h += `<td class="status-${day}">${day}</td>`);
                h += `<td class="font-bold">${r.totalP}</td></tr>`;
            });
            document.getElementById('adminReportOutput').innerHTML = h + `</table>`;
        }

        function saveSettings() {
            const lat = document.getElementById('setLat').value;
            const lon = document.getElementById('setLon').value;
            const rad = document.getElementById('setRad').value;
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=update_settings&lat=${lat}&lon=${lon}&rad=${rad}&callback=hSave`;
            document.body.appendChild(s);
        }
        window.hSave = function() { alert("Updated"); location.reload(); }

        function openAdminPrompt() { if(prompt("PIN") === "1201") document.getElementById('adminNav').classList.remove('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
