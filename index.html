<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding-bottom: 80px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #94a3b8; }
        .nav-btn.active { color: #2dd4bf; }
    </style>
</head>
<body>

    <div id="authSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl">
            <h1 class="text-3xl font-bold text-teal-500 text-center mb-6">LIFECARE</h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-teal-500 text-white">
                <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-teal-500 text-white">
                <button id="loginBtn" onclick="runAuth('login')" class="w-full bg-teal-600 p-4 rounded-2xl font-bold transition-all active:scale-95">LOG IN</button>
                <div class="flex justify-between px-2">
                    <button onclick="runAuth('register')" class="text-slate-500 text-[10px] uppercase">Register</button>
                    <button onclick="openAdminPrompt()" class="text-slate-700 text-[10px] uppercase">Admin Access</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-10">
            <h2 id="pageTitle" class="text-xl font-bold text-teal-400">Dashboard</h2>
            <span id="userNameDisplay" class="text-xs text-slate-400"></span>
        </div>

        <div id="content" class="p-4 space-y-6">
            <div id="page-home" class="page-view space-y-6">
                <div class="glass p-6 rounded-3xl text-center">
                    <p class="text-slate-400 text-xs mb-4">Location Services Active</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="alert('Clocked In')" class="bg-emerald-600 p-8 rounded-2xl font-bold">CLOCK IN</button>
                        <button onclick="alert('Clocked Out')" class="bg-rose-600 p-8 rounded-2xl font-bold">CLOCK OUT</button>
                    </div>
                </div>
            </div>

            <div id="page-bio" class="page-view hidden glass p-6 rounded-3xl space-y-4">
                <h3 class="font-bold border-b border-slate-700 pb-2">Staff Profile</h3>
                <div id="bioData" class="space-y-2 text-sm"></div>
            </div>

            <div id="page-admin" class="page-view hidden glass p-6 rounded-3xl space-y-4">
                <h3 class="font-bold text-teal-400">Hospital Location Settings</h3>
                <button onclick="captureLoc()" class="w-full bg-slate-800 p-4 rounded-xl border border-teal-500">Capture Current GPS</button>
                <div class="text-xs text-slate-400" id="coords">Lat: --, Lon: --</div>
                <button onclick="alert('Location Saved')" class="w-full bg-teal-600 p-3 rounded-xl font-bold">Save Hospital Center</button>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center">
            <button onclick="nav('home')" class="nav-btn active" id="nav-home"><span>🏠</span>Home</button>
            <button onclick="nav('bio')" class="nav-btn" id="nav-bio"><span>👤</span>Bio</button>
            <button id="adminNav" onclick="nav('admin')" class="nav-btn hidden"><span>⚙️</span>Admin</button>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzu4ZJyeifn_CEIKWJgpl39oxscN1VQbxqAU6a9TDfPLJa0120sJ-IDopfJJQ9N_K-NiA/exec";
        let currentUser = null;

        function nav(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.getElementById('nav-' + pageId).classList.add('active');
            document.getElementById('pageTitle').innerText = pageId.toUpperCase();
        }

        function runAuth(mode) {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Fill all fields");

            document.getElementById('loginBtn').innerText = "CONNECTING...";
            
            const script = document.createElement('script');
            script.src = `${CLOUD_URL}?action=check_auth&email=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}&type=${mode}&callback=handleAuth`;
            document.body.appendChild(script);
        }

        window.handleAuth = function(data) {
            document.getElementById('loginBtn').innerText = "LOG IN";
            if(data.result === "registered") return alert("Registered! Now Log In.");
            if(data.exists && data.savedPass === document.getElementById('pass').value) {
                currentUser = data;
                document.getElementById('userNameDisplay').innerText = data.name;
                document.getElementById('bioData').innerHTML = `<p>ID: ${data.id}</p><p>Name: ${data.name}</p><p>Dept: ${data.dept}</p>`;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
            } else { alert("Login failed. Check credentials."); }
        }

        function openAdminPrompt() {
            const pin = prompt("Enter Admin PIN:");
            if(pin === "1201") {
                document.getElementById('adminNav').classList.remove('hidden');
                alert("Admin Settings Unlocked");
            }
        }

        function captureLoc() {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('coords').innerText = `Lat: ${p.coords.latitude}, Lon: ${p.coords.longitude}`;
            });
        }
    </script>
</body>
</html>
