<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecare Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .nav-active { color: #22c55e !important; border-top: 3px solid #22c55e; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-white">

<div id="authPage" class="p-8 max-w-md mx-auto mt-20">
    <h1 class="text-3xl font-black text-blue-900 mb-6">LIFECARE</h1>
    <input type="email" id="lEmail" placeholder="Work Email" class="w-full p-4 border rounded-xl mb-4 bg-slate-50">
    <input type="password" id="lPass" placeholder="Password" class="w-full p-4 border rounded-xl mb-6 bg-slate-50">
    <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-500 text-white p-4 rounded-xl font-bold uppercase">Log In</button>
</div>

<div id="app" class="hidden min-h-screen flex flex-col">
    <header class="bg-blue-100 p-4 sticky top-0 flex justify-between items-center z-50">
        <h2 class="font-black text-blue-900 text-xs">LIFECARE KIKUYU</h2>
        <span id="navName" class="text-[10px] font-bold text-blue-700"></span>
    </header>

    <main class="p-4 flex-grow">
        <div id="t-home" class="tab-content active text-center pt-10">
            <p id="gpsTxt" class="text-slate-400 text-[10px] mb-8 italic uppercase">Checking Location...</p>
            <button id="btnIn" onclick="clockAction('IN')" class="w-full py-16 mb-4 rounded-3xl bg-green-500 text-white text-3xl font-black opacity-50 cursor-not-allowed" disabled>CLOCK IN</button>
            <button id="btnOut" onclick="clockAction('OUT')" class="w-full py-16 rounded-3xl bg-blue-600 text-white text-3xl font-black hidden">CLOCK OUT</button>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-4 pb-8">
        <button onclick="location.reload()" class="text-slate-400 text-center"><i class="fa fa-sign-out block"></i><span class="text-[8px]">LOGOUT</span></button>
    </nav>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkZX1FcGl9GO0s27HA8Fpdcg1LBf-Mpqlg2NLDRnNfliBYrE4rvENUGFCnoezD33pFLg/exec";
    let u = {};

    function handleLogin() {
        const email = document.getElementById('lEmail').value;
        const pass = document.getElementById('lPass').value;
        document.getElementById('loginBtn').innerText = "Verifying...";
        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?action=login&email=${email}&pass=${pass}&callback=onLogin`;
        document.body.appendChild(s);
    }

    window.onLogin = function(data) {
        if(data.success) {
            u = data;
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('navName').innerText = u.name;
            checkGPS();
        } else {
            alert(data.message);
            document.getElementById('loginBtn').innerText = "Log In";
        }
    }

    function checkGPS() {
        navigator.geolocation.getCurrentPosition(pos => {
            const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, u.geo.lat, u.geo.lon);
            if(dist <= u.geo.rad) {
                document.getElementById('gpsTxt').innerText = "LOCATION VERIFIED";
                document.getElementById('btnIn').disabled = false;
                document.getElementById('btnIn').classList.remove('opacity-50', 'cursor-not-allowed');
                u.currentLoc = `${pos.coords.latitude},${pos.coords.longitude}`;
            } else {
                document.getElementById('gpsTxt').innerText = "OUT OF RANGE (" + Math.round(dist) + "m)";
            }
        });
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const p1 = lat1 * Math.PI/180;
        const p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180;
        const dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function clockAction(type) {
        const action = type === 'IN' ? 'clockIn' : 'clockOut';
        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?action=${action}&id=${u.id}&name=${u.name}&desig=${u.desig}&dept=${u.dept}&loc=${u.currentLoc}&callback=onClock`;
        document.body.appendChild(s);
    }

    window.onClock = function(data) {
        if(data.success) {
            alert("Success!");
            location.reload();
        } else {
            alert(data.message);
        }
    }
</script>
</body>
</html>
