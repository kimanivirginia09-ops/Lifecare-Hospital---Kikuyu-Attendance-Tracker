<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecare Hospital Kikuyu - Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --lc-blue: #e0f2fe; --lc-green: #22c55e; }
        body { background: #ffffff; color: #1e293b; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .header-bg { background-color: var(--lc-blue); border-bottom: 2px solid #bae6fd; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; margin-bottom: 15px; overflow: hidden; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #64748b; width: 12%; cursor: pointer; font-weight: 600; }
        .nav-btn.active { color: var(--lc-green); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-primary { background-color: var(--lc-green); color: white; font-weight: 800; padding: 14px; border-radius: 12px; width: 100%; border: none; }
        .inactive { background-color: #e2e8f0 !important; color: #94a3b8 !important; cursor: not-allowed; }
        .input-field { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px; margin-bottom: 15px; background: #f8fafc; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 800px; }
        th { background: var(--lc-blue); color: #0369a1; padding: 10px; border: 1px solid #bae6fd; }
        td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loader"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-500"></div></div>

    <div id="authSection" class="p-6 max-w-md mx-auto min-h-screen flex flex-col justify-center">
        <div class="flex justify-end gap-2 absolute top-6 right-6">
            <button onclick="toggleAuth('reg')" class="text-[10px] font-bold text-blue-600 border border-blue-200 px-3 py-1.5 rounded-lg">REGISTER</button>
            <button onclick="adminPrompt()" class="text-[10px] font-bold text-slate-400 border border-slate-100 px-3 py-1.5 rounded-lg">ADMIN ACCESS</button>
        </div>
        <div id="loginBox" class="text-center">
            <h1 class="text-4xl font-black text-blue-500 mb-8">LIFECARE</h1>
            <input type="email" id="lEmail" placeholder="Email" class="input-field">
            <input type="password" id="lPass" placeholder="Password" class="input-field">
            <button onclick="doLogin()" class="btn-primary">LOG IN</button>
        </div>
        <div id="regBox" class="hidden">
            <h2 class="font-black mb-6 text-sm text-center">REGISTER</h2>
            <input type="text" id="rId" placeholder="Employee ID" class="input-field">
            <input type="email" id="rEmail" placeholder="Email" class="input-field">
            <input type="password" id="rPass" placeholder="Choose Password" class="input-field">
            <button onclick="doReg()" class="btn-primary">REGISTER</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="header-bg p-4 sticky top-0 flex justify-between items-center z-50">
            <span class="font-black text-blue-600">LIFECARE HOSPITAL</span>
            <button onclick="logout()" class="text-[10px] font-bold text-red-500 bg-white px-3 py-1 rounded">LOGOUT</button>
        </header>

        <main class="p-4">
            <div id="t-home" class="tab-content active py-10">
                <div class="glass-card p-10 text-center">
                    <p id="vicLabel" class="text-[10px] font-bold text-slate-400 mb-8 italic">Checking Location...</p>
                    <button id="btnIn" onclick="clock('IN')" class="btn-primary p-12 text-2xl mb-4">CLOCK IN</button>
                    <button id="btnOut" onclick="clock('OUT')" class="hidden btn-primary p-12 text-2xl bg-blue-500">CLOCK OUT</button>
                </div>
            </div>

            <div id="t-logs" class="tab-content">
                <h3 class="font-black text-blue-600 mb-4 uppercase text-xs">Attendance Logs</h3>
                <div class="overflow-x-auto glass-card">
                    <table>
                        <thead><tr><th>Date</th><th>Status</th><th>In</th><th>Out</th><th>Work Hrs</th></tr></thead>
                        <tbody id="logsBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="t-leave" class="tab-content space-y-4">
                <h3 class="font-black text-blue-600 uppercase text-xs">Leave Management</h3>
                <div id="leaveCards" class="grid grid-cols-1 gap-4"></div>
            </div>

            <div id="t-outduty" class="tab-content">
                <h3 class="font-black text-blue-600 uppercase text-xs mb-4">Apply Out Duty</h3>
                <div class="glass-card p-6">
                    <input type="date" class="input-field">
                    <textarea placeholder="Reason..." class="input-field h-32"></textarea>
                    <button class="btn-primary">SUBMIT REQUEST</button>
                </div>
            </div>

            <div id="t-bio" class="tab-content">
                <h1 id="bName" class="text-4xl font-black mb-8 text-slate-800"></h1>
                <div class="glass-card p-5">
                    <p class="font-bold text-blue-500 text-[10px] uppercase border-b mb-4 pb-2">Personal Details</p>
                    <div id="personalDetails" class="grid grid-cols-2 gap-4 text-sm font-medium"></div>
                </div>
                <div class="glass-card p-5">
                    <p class="font-bold text-blue-500 text-[10px] uppercase border-b mb-4 pb-2">Employment Details</p>
                    <div id="employmentDetails" class="grid grid-cols-2 gap-4 text-sm font-medium"></div>
                </div>
            </div>

            <div id="t-docs" class="tab-content">
                <h3 class="font-black text-blue-600 uppercase text-xs mb-4">Documents</h3>
                <div id="docList" class="space-y-3"></div>
            </div>

            <div id="t-reports" class="tab-content space-y-8">
                <div class="flex justify-between items-center"><h3 class="font-black text-blue-700 uppercase">Work Duration Summary</h3><button onclick="exportCSV('repSumm')" class="bg-blue-600 text-white text-[9px] px-2 py-1 rounded">Excel</button></div>
                <div class="overflow-x-auto glass-card"><table id="repSumm"></table></div>
            </div>

            <div id="t-settings" class="tab-content">
                <h3 class="font-black text-blue-600 uppercase text-xs mb-4">Geofencing</h3>
                <div class="glass-card p-6 space-y-4">
                    <input id="sLat" placeholder="Lat" class="input-field"><input id="sLon" placeholder="Lon" class="input-field"><input id="sRad" placeholder="Radius" class="input-field">
                    <button class="btn-primary">SAVE SETTINGS</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-50">
            <div onclick="nav('home')" class="nav-btn active" id="n-home">🏠<br>Home</div>
            <div onclick="nav('logs')" class="nav-btn" id="n-logs">📅<br>Logs</div>
            <div onclick="nav('leave')" class="nav-btn" id="n-leave">✈️<br>Leave</div>
            <div onclick="nav('outduty')" class="nav-btn" id="n-outduty">🚗<br>Out</div>
            <div onclick="nav('bio')" class="nav-btn" id="n-bio">👤<br>Bio</div>
            <div onclick="nav('docs')" class="nav-btn" id="n-docs">📄<br>Docs</div>
            <div onclick="nav('reports')" class="nav-btn hidden" id="n-reports">📊<br>Admin</div>
            <div onclick="nav('settings')" class="nav-btn hidden" id="n-settings">⚙️<br>Set</div>
        </nav>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycby54HfJj8c5Up4swSXRV5YhPP5y5g-lQj8OhPLSzDDcuKOnlaDgYJZfPveAlHo-XVMn_Q/exec";
        let user, config = {lat:0, lon:0, rad:0};

        function setLoading(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function toggleAuth(v) { document.getElementById('loginBox').classList.toggle('hidden', v==='reg'); document.getElementById('regBox').classList.toggle('hidden', v!=='reg'); }
        function adminPrompt() { if(prompt("Admin Access PIN") === "1201") { localStorage.setItem('lc_admin', '1'); if(user) showAdmin(); } }
        function showAdmin() { document.getElementById('n-reports').classList.remove('hidden'); document.getElementById('n-settings').classList.remove('hidden'); }

        function doLogin() {
            setLoading(true);
            const email = document.getElementById('lEmail').value;
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=check_auth&email=${encodeURIComponent(email)}&callback=hAuth`;
            document.body.appendChild(s);
        }

        window.hAuth = (d) => {
            setLoading(false);
            if(d.exists && d.pass == document.getElementById('lPass').value) {
                user = d; localStorage.setItem('lc_sess', JSON.stringify(d)); startApp(d);
            } else alert("Invalid Credentials");
        }

        function startApp(d) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('bName').innerText = d.name;
            
            // Bio Population
            document.getElementById('personalDetails').innerHTML = `
                <div><p class="text-[9px] text-slate-400">ID</p><p>${d.id}</p></div>
                <div><p class="text-[9px] text-slate-400">DEPT</p><p>${d.dept}</p></div>
                <div><p class="text-[9px] text-slate-400">DESIGNATION</p><p>${d.desig}</p></div>
                <div><p class="text-[9px] text-slate-400">EMAIL</p><p class="break-all">${d.email}</p></div>
                <div><p class="text-[9px] text-slate-400">PHONE</p><p>${d.phone}</p></div>
                <div><p class="text-[9px] text-slate-400">GENDER</p><p>${d.gender}</p></div>
                <div><p class="text-[9px] text-slate-400">DOB</p><p>${d.dob}</p></div>`;
            document.getElementById('employmentDetails').innerHTML = `
                <div><p class="text-[9px] text-slate-400">MANAGER</p><p>${d.manager}</p></div>
                <div><p class="text-[9px] text-slate-400">TYPE</p><p>${d.empType}</p></div>`;

            // Leave Cards
            const leaves = { annual: 'Annual', sick: 'Sick', mat: 'Maternity', pat: 'Paternity', comp: 'Compassionate' };
            document.getElementById('leaveCards').innerHTML = Object.keys(leaves).map(k => `
                <div class="glass-card p-4">
                    <p class="font-black text-blue-600 text-[10px] mb-3">${leaves[k].toUpperCase()}</p>
                    <div class="grid grid-cols-3 text-center text-xs">
                        <div><p class="text-[8px] text-slate-400">ACCRUED</p><p class="font-bold">${d.bal[k][0]}</p></div>
                        <div><p class="text-[8px] text-slate-400">USED</p><p class="font-bold text-red-500">${d.bal[k][1]}</p></div>
                        <div><p class="text-[8px] text-slate-400">BAL</p><p class="font-bold text-green-600">${d.bal[k][0]-d.bal[k][1]}</p></div>
                    </div>
                    <button class="btn-primary py-2 mt-4 text-[9px]">APPLY</button>
                </div>`).join('');

            // Docs Upload
            const docs = ["Employee Contract", "CV/Resume", "Academic Documents", "License", "National ID/Passport", "KRA", "SHIF", "NSSF", "Bank form"];
            document.getElementById('docList').innerHTML = docs.map(doc => `
                <div class="glass-card p-4 flex justify-between items-center text-[10px] font-bold">
                    <span>${doc}</span>
                    <button onclick="handleDocUpload('${doc}')" class="bg-green-50 text-green-600 border px-3 py-1 rounded">UPLOAD</button>
                </div>`).join('');

            if(localStorage.getItem('lc_admin') === '1') showAdmin();
            fetchConfig();
        }

        function handleDocUpload(name) {
            const input = document.createElement('input'); input.type = 'file';
            input.onchange = e => { alert(name + " selected: " + e.target.files[0].name); };
            input.click();
        }

        function clock(type) {
            setLoading(true);
            navigator.geolocation.getCurrentPosition(p => {
                const loc = `${p.coords.latitude.toFixed(4)},${p.coords.longitude.toFixed(4)}`;
                const s = document.createElement('script');
                s.src = `${CLOUD_URL}?action=clock_action&id=${user.id}&type=${type}&location=${loc}&callback=hClock`;
                document.body.appendChild(s);
            });
        }
        window.hClock = (d) => { 
            setLoading(false); 
            document.getElementById('btnIn').classList.toggle('hidden', d.type==='IN');
            document.getElementById('btnOut').classList.toggle('hidden', d.type!=='IN');
            alert("Clocked " + d.type); 
        }

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('t-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            if(id === 'logs') fetchLogs();
            if(id === 'reports') fetchReports();
        }

        function fetchLogs() {
            setLoading(true);
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=get_logs&id=${user.id}&callback=hLogs`;
            document.body.appendChild(s);
        }
        window.hLogs = (d) => {
            setLoading(false);
            document.getElementById('logsBody').innerHTML = d.logs.map(l => `<tr><td>${l.date}</td><td>${l.status}</td><td>${l.in}</td><td>${l.out}</td><td>${l.total}</td></tr>`).join('');
        }

        function fetchReports() {
            setLoading(true);
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=get_admin_reports&callback=hRep`;
            document.body.appendChild(s);
        }
        window.hRep = (d) => {
            setLoading(false);
            let h = `<tr><th>ID</th><th>Name</th><th>Dept</th><th>Desig</th>`;
            for(let i=1; i<=d.days; i++) h += `<th>${i}</th>`;
            h += `<th>P</th><th>A</th><th>L</th><th>O</th></tr>`;
            document.getElementById('repSumm').innerHTML = h + d.summary.map(r => `<tr><td>${r.id}</td><td>${r.name}</td><td>${r.dept}</td><td>${r.desig}</td>${r.dates.map(x=>`<td>${x}</td>`).join('')}<td>${r.pres}</td><td>${r.abs}</td><td>${r.leave}</td><td>${r.out}</td></tr>`).join('');
        }

        function fetchConfig() {
            const s = document.createElement('script');
            s.src = `${CLOUD_URL}?action=get_settings&callback=hSet`;
            document.body.appendChild(s);
        }
        window.hSet = (d) => { 
            config=d; 
            document.getElementById('sLat').value=d.lat; document.getElementById('sLon').value=d.lon; document.getElementById('sRad').value=d.rad;
            startGPS(); 
        }

        function startGPS() {
            navigator.geolocation.watchPosition(p => {
                const dist = getDist(p.coords.latitude, p.coords.longitude, config.lat, config.lon);
                document.getElementById('vicLabel').innerText = Math.round(dist) + "m FROM HOSPITAL SITE";
                const active = dist <= config.rad;
                [document.getElementById('btnIn'), document.getElementById('btnOut')].forEach(b => {
                    b.disabled = !active; b.classList.toggle('inactive', !active);
                });
            }, null, {enableHighAccuracy:true});
        }

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const f1 = lat1 * Math.PI/180, f2 = lat2 * Math.PI/180;
            const df = (lat2-lat1)*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(df/2)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { const s = localStorage.getItem('lc_sess'); if(s) startApp(JSON.parse(s)); }
    </script>
</body>
</html>
