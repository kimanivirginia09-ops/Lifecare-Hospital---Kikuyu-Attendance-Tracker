<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecare Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --lc-blue: #e0f2fe; --lc-green: #22c55e; }
        body { background-color: #ffffff; color: #1e293b; font-family: sans-serif; padding-bottom: 100px; }
        header { background-color: var(--lc-blue); border-bottom: 2px solid #bae6fd; padding: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-green { background-color: var(--lc-green); color: white; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; transition: 0.2s; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #64748b; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--lc-green); font-weight: bold; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .glass-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .inactive-btn { background-color: #cbd5e1 !important; cursor: not-allowed !important; pointer-events: none; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loader">
    <div class="w-12 h-12 border-4 border-t-green-500 rounded-full animate-spin"></div>
    <p class="mt-4 text-green-600 font-bold text-[10px] uppercase">Please wait...</p>
</div>

<div id="authPage" class="max-w-md mx-auto min-h-screen flex flex-col justify-center px-8 relative">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-black text-slate-800">LIFECARE</h1>
        <p class="text-[10px] tracking-widest text-slate-400 uppercase">Hospital Kikuyu Portal</p>
    </div>

    <div id="loginView">
        <input type="email" id="lEmail" placeholder="Work Email" class="w-full border p-4 rounded-xl mb-3 outline-none focus:border-green-500 bg-slate-50">
        <input type="password" id="lPass" placeholder="Password" class="w-full border p-4 rounded-xl mb-6 outline-none focus:border-green-500 bg-slate-50">
        <button onclick="handleAuth()" class="btn-green uppercase">Log In</button>
        <button onclick="toggleAuth(true)" class="w-full text-[10px] text-blue-500 mt-6 font-bold uppercase">Register/Set Password</button>
    </div>

    <div id="regView" class="hidden">
        <input type="text" id="rId" placeholder="Employee ID" class="w-full border p-4 rounded-xl mb-3 outline-none bg-slate-50">
        <input type="password" id="rPass" placeholder="New Password" class="w-full border p-4 rounded-xl mb-6 outline-none bg-slate-50">
        <button onclick="handleReg()" class="w-full bg-blue-600 text-white font-bold p-4 rounded-xl uppercase">Save Password</button>
        <button onclick="toggleAuth(false)" class="w-full text-[10px] text-slate-400 mt-4 uppercase">Back to Login</button>
    </div>
</div>

<div id="portalApp" class="hidden">
    <header class="flex justify-between items-center">
        <h2 class="text-blue-900 font-black text-xs uppercase">Lifecare Kikuyu</h2>
        <button onclick="location.reload()" class="text-red-500 font-bold text-[10px] uppercase">Logout</button>
    </header>

    <main>
        <div id="t-home" class="tab-content active text-center py-12">
            <p id="gpsLabel" class="text-[9px] font-bold text-red-500 mb-8 uppercase italic">Verifying Location...</p>
            <button id="btnIn" onclick="clock('IN')" class="btn-green py-20 text-4xl inactive-btn" disabled>CLOCK IN</button>
            <button id="btnOut" onclick="clock('OUT')" class="btn-green py-20 text-4xl hidden">CLOCK OUT</button>
        </div>

        <div id="t-logs" class="tab-content">
            <h3 class="font-black text-[10px] uppercase mb-4">Profile Info</h3>
            <div class="glass-card text-xs">
                <div class="flex justify-between border-b pb-2"><span>ID</span><b id="bioId"></b></div>
                <div class="flex justify-between pt-2"><span>Dept</span><b id="bioDept"></b></div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-4 shadow-lg">
        <div onclick="nav('home', this)" class="nav-btn active">Home</div>
        <div onclick="nav('logs', this)" class="nav-btn">Profile</div>
    </nav>
</div>

<script>
    // This is your Backend URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUJiuiWJOWzX84pAOY0Xl8KH5AZg7iF-Z7C9DwKe0rUHKUMFZa6hJJoQubfzVKOrduhg/exec"; 
    
    let user, config = {lat:0, lon:0, rad:0};

    function setLoading(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function toggleAuth(reg) { document.getElementById('loginView').classList.toggle('hidden', reg); document.getElementById('regView').classList.toggle('hidden', !reg); }

    async function handleAuth() {
        setLoading(true);
        const email = document.getElementById('lEmail').value.trim().toLowerCase();
        const pass = document.getElementById('lPass').value.trim();
        try {
            const response = await fetch(`${SCRIPT_URL}?action=login&email=${encodeURIComponent(email)}`);
            const d = await response.json();
            setLoading(false);
            if(d.exists && String(d.pass) === String(pass)) {
                user = d;
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('portalApp').classList.remove('hidden');
                initApp();
            } else { alert("Login Failed: Check email and password."); }
        } catch (e) { setLoading(false); alert("Connection Error. Please check your internet."); }
    }

    async function handleReg() {
        setLoading(true);
        const id = document.getElementById('rId').value;
        const pass = document.getElementById('rPass').value;
        try {
            const response = await fetch(`${SCRIPT_URL}?action=register&id=${id}&pass=${pass}`);
            const d = await response.json();
            setLoading(false);
            if(d.success) {
                alert("Password saved! You can now log in.");
                toggleAuth(false);
            } else {
                alert("Error: " + d.msg);
            }
        } catch (e) { setLoading(false); alert("Registration Error."); }
    }

    function initApp() {
        document.getElementById('bioId').innerText = user.id;
        document.getElementById('bioDept').innerText = user.dept;
        fetchConfig();
    }

    async function fetchConfig() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=get_settings`);
            config = await res.json();
            trackGPS();
        } catch(e) { console.log("Settings Error"); }
    }

    function trackGPS() {
        navigator.geolocation.watchPosition(p => {
            const d = getDist(p.coords.latitude, p.coords.longitude, config.lat, config.lon);
            const ok = d <= config.rad;
            const lb = document.getElementById('gpsLabel');
            lb.innerText = ok ? "RANGE VERIFIED" : `OUTSIDE RANGE (${Math.round(d)}m)`;
            lb.className = ok ? "text-green-500 font-bold uppercase text-[10px]" : "text-red-500 font-bold uppercase text-[10px]";
            document.getElementById('btnIn').disabled = !ok;
            document.getElementById('btnIn').classList.toggle('inactive-btn', !ok);
        }, null, {enableHighAccuracy:true});
    }

    function getDist(la1, lo1, la2, lo2) {
        const R = 6371e3, f1 = la1*Math.PI/180, f2 = la2*Math.PI/180, df = (la2-la1)*Math.PI/180, dl = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(df/2)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function clock(t) {
        setLoading(true);
        navigator.geolocation.getCurrentPosition(async p => {
            const loc = `${p.coords.latitude},${p.coords.longitude}`;
            try {
                await fetch(`${SCRIPT_URL}?action=clock_action&id=${user.id}&name=${encodeURIComponent(user.name)}&type=${t}&location=${loc}`);
                setLoading(false); alert("Success!");
                if(t === 'IN') { document.getElementById('btnIn').classList.add('hidden'); document.getElementById('btnOut').classList.remove('hidden'); }
                else { document.getElementById('btnOut').classList.add('hidden'); document.getElementById('btnIn').classList.remove('hidden'); }
            } catch(e) { setLoading(false); alert("Clock Error"); }
        });
    }

    function nav(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-'+id).classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
