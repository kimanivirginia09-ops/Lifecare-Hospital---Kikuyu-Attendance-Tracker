<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecare Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --lc-blue: #e0f2fe; --lc-green: #22c55e; }
        body { background-color: #ffffff; color: #1e293b; font-family: sans-serif; padding-bottom: 100px; }
        header { background-color: var(--lc-blue); border-bottom: 2px solid #bae6fd; padding: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-green { background-color: var(--lc-green); color: white; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #64748b; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--lc-green); font-weight: bold; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .glass-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .inactive-btn { background-color: #cbd5e1 !important; cursor: not-allowed !important; pointer-events: none; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #bae6fd; color: #0369a1; padding: 8px; border: 1px solid #93c5fd; }
        td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div id="loader">
    <div class="w-12 h-12 border-4 border-t-green-500 rounded-full animate-spin"></div>
    <p class="mt-4 text-green-600 font-bold text-[10px] uppercase">Syncing with Sheet...</p>
</div>

<div id="authPage" class="max-w-md mx-auto min-h-screen flex flex-col justify-center px-8 relative">
    <button onclick="checkAdmin()" class="absolute top-6 right-6 text-[10px] bg-slate-100 px-3 py-1 rounded border font-bold uppercase">Admin</button>
    <div class="text-center mb-10">
        <h1 class="text-4xl font-black text-slate-800">LIFECARE</h1>
        <p class="text-[10px] tracking-widest text-slate-400 uppercase">Hospital Kikuyu Portal</p>
    </div>
    <input type="email" id="lEmail" placeholder="Work Email" class="w-full border p-4 rounded-xl mb-3 outline-none focus:border-green-500">
    <input type="password" id="lPass" placeholder="Password" class="w-full border p-4 rounded-xl mb-6 outline-none focus:border-green-500">
    <button onclick="handleAuth()" class="btn-green uppercase">Log In</button>
</div>

<div id="portalApp" class="hidden">
    <header class="flex justify-between items-center">
        <h2 class="text-blue-900 font-black text-xs uppercase">Lifecare Kikuyu</h2>
        <span id="adminBadge" class="hidden bg-red-500 text-white text-[8px] px-2 py-0.5 rounded font-bold">ADMIN</span>
    </header>

    <main>
        <div id="t-home" class="tab-content active text-center py-12">
            <p id="gpsLabel" class="text-[9px] font-bold text-red-500 mb-8 uppercase italic">Locating Hospital...</p>
            <button id="btnIn" onclick="clockAction('IN')" class="btn-green py-20 text-4xl inactive-btn" disabled>CLOCK IN</button>
            <button id="btnOut" onclick="clockAction('OUT')" class="btn-green py-20 text-4xl hidden">CLOCK OUT</button>
        </div>

        <div id="t-logs" class="tab-content">
            <h3 class="font-black text-[10px] text-blue-900 uppercase mb-4">Attendance Log</h3>
            <div class="overflow-x-auto glass-card p-0">
                <table id="logsTable">
                    <thead><tr><th>Date</th><th>Clock In</th><th>Clock Out</th><th>Duration</th></tr></thead>
                    <tbody id="logsBody"></tbody>
                </table>
            </div>
        </div>

        <div id="t-leave" class="tab-content">
            <h3 class="font-black text-[10px] text-blue-900 uppercase mb-4">Leave Balances</h3>
            <div id="leaveArea" class="space-y-3"></div>
        </div>

        <div id="t-bio" class="tab-content">
            <h1 id="bioName" class="text-3xl font-black text-slate-800 uppercase mb-6 leading-none"></h1>
            <div class="glass-card text-xs space-y-4">
                <div class="flex justify-between"><span>Employee ID</span><b id="bioId"></b></div>
                <div class="flex justify-between"><span>Designation</span><b id="bioDesig"></b></div>
                <div class="flex justify-between"><span>Department</span><b id="bioDept"></b></div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 px-1">
        <div onclick="nav('home')" id="n-home" class="nav-btn active">Home</div>
        <div onclick="nav('logs')" id="n-logs" class="nav-btn">Logs</div>
        <div onclick="nav('leave')" id="n-leave" class="nav-btn">Leave</div>
        <div onclick="nav('bio')" id="n-bio" class="nav-btn">Bio</div>
        <div onclick="nav('admin')" id="n-admin" class="nav-btn hidden text-red-500">Admin</div>
    </nav>
</div>

<script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycby54HfJj8c5Up4swSXRV5YhPP5y5g-lQj8OhPLSzDDcuKOnlaDgYJZfPveAlHo-XVMn_Q/exec";
    let user, settings = {lat:0, lon:0, rad:0};

    function setLoading(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function checkAdmin() { if(prompt("Pin:") === "1234") { document.getElementById('n-admin').classList.remove('hidden'); document.getElementById('adminBadge').classList.remove('hidden'); } }

    function handleAuth() {
        setLoading(true);
        const email = document.getElementById('lEmail').value;
        const s = document.createElement('script');
        s.src = `${SHEET_URL}?action=login&email=${encodeURIComponent(email)}&callback=authCB`;
        document.body.appendChild(s);
    }

    window.authCB = (d) => {
        setLoading(false);
        if(d.exists && d.pass == document.getElementById('lPass').value) {
            user = d;
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('portalApp').classList.remove('hidden');
            setupProfile();
            fetchSettings();
        } else { alert("Login Failed"); }
    }

    function setupProfile() {
        document.getElementById('bioName').innerText = user.name;
        document.getElementById('bioId').innerText = user.id;
        document.getElementById('bioDesig').innerText = user.desig;
        document.getElementById('bioDept').innerText = user.dept;

        // Leave mapping adjusted to image headers: 8ick_Total, Annual_Total, etc.
        const leaves = [
            {n:'Annual', t: user.bal.Annual_Total, u: user.bal.Annual_Used},
            {n:'Sick', t: user.bal['8ick_Total'], u: user.bal['8ick_Used']},
            {n:'Maternity', t: user.bal.Maternity_Total, u: user.bal.Maternity_Used},
            {n:'Compassionate', t: user.bal['Compassionate_T'], u: user.bal['Compassionate_U']}
        ];

        document.getElementById('leaveArea').innerHTML = leaves.map(l => `
            <div class="glass-card flex justify-between items-center text-[10px]">
                <span><b>${l.n} Leave</b> (Bal: ${(l.t||0)-(l.u||0)})</span>
                <button class="text-blue-500 font-bold border px-3 py-1 rounded bg-white">APPLY</button>
            </div>
        `).join('');
    }

    function fetchSettings() { const s=document.createElement('script'); s.src=`${SHEET_URL}?action=get_settings&callback=setCB`; document.body.appendChild(s); }
    window.setCB = (d) => { settings = d; startGPS(); }

    function startGPS() {
        navigator.geolocation.watchPosition(p => {
            const dist = calcDist(p.coords.latitude, p.coords.longitude, settings.lat, settings.lon);
            const ok = dist <= settings.rad;
            const lb = document.getElementById('gpsLabel');
            lb.innerText = ok ? "HOSPITAL RANGE VERIFIED" : `OUTSIDE RANGE (${Math.round(dist)}m)`;
            lb.className = ok ? "text-[9px] font-bold text-green-500 mb-8 uppercase" : "text-[9px] font-bold text-red-500 mb-8 uppercase italic";
            document.getElementById('btnIn').disabled = !ok;
            document.getElementById('btnIn').classList.toggle('inactive-btn', !ok);
        }, null, {enableHighAccuracy:true});
    }

    function calcDist(la1, lo1, la2, lo2) {
        const R = 6371e3, f1 = la1*Math.PI/180, f2 = la2*Math.PI/180, df = (la2-la1)*Math.PI/180, dl = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(df/2)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function clockAction(type) {
        setLoading(true);
        navigator.geolocation.getCurrentPosition(p => {
            const loc = `${p.coords.latitude.toFixed(5)},${p.coords.longitude.toFixed(5)}`;
            const s = document.createElement('script');
            s.src = `${SHEET_URL}?action=clock_action&id=${user.id}&name=${encodeURIComponent(user.name)}&desig=${encodeURIComponent(user.desig)}&dept=${encodeURIComponent(user.dept)}&type=${type}&location=${loc}&callback=clockCB`;
            document.body.appendChild(s);
        });
    }

    window.clockCB = (d) => { setLoading(false); alert(`Logged ${d.type}`); }

    function nav(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById('t-'+id).classList.add('active');
        document.getElementById('n-'+id).classList.add('active');
    }
</script>
</body>
</html>
