<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare Hospital | Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-teal-500 text-center">LIFECARE</h1>
            <p id="modeText" class="text-slate-400 text-xs uppercase tracking-widest mt-1 font-semibold text-center">Staff Portal</p>
        </div>

        <div id="authSection" class="space-y-4">
            <input type="email" id="email" placeholder="Email Address" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-teal-500 transition-all text-white">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-teal-500 transition-all text-white">
            
            <button id="mainBtn" onclick="handleAuth()" class="w-full bg-teal-600 hover:bg-teal-500 py-4 rounded-2xl font-bold transition-all">LOG IN</button>
            
            <div class="text-center">
                <button onclick="toggleRegister()" id="toggleBtn" class="text-[10px] text-slate-500 hover:text-teal-400 uppercase tracking-widest">First time? Register here</button>
            </div>
        </div>

        <div id="clockSection" class="hidden space-y-6 text-center">
            <div class="py-4 border-b border-slate-800">
                <p id="welcomeMsg" class="font-bold text-xl text-teal-400"></p>
                <p id="staffDetails" class="text-[10px] text-slate-500 italic"></p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="submitShift('IN')" class="bg-emerald-600 hover:bg-emerald-500 py-6 rounded-2xl font-bold">CLOCK IN</button>
                <button onclick="submitShift('OUT')" class="bg-rose-600 hover:bg-rose-500 py-6 rounded-2xl font-bold">CLOCK OUT</button>
            </div>
            <button onclick="showAdmin()" class="text-[9px] text-slate-600 uppercase">View Reports</button>
        </div>

        <div id="adminSection" class="hidden mt-8 pt-6 border-t border-slate-800">
            <h2 class="text-teal-500 font-bold text-sm mb-4">Monthly Analytics</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-[10px] text-left">
                    <thead>
                        <tr class="text-slate-500 border-b border-slate-800">
                            <th class="pb-2">Name</th>
                            <th class="pb-2 text-center">Days</th>
                            <th class="pb-2 text-center">Hours</th>
                            <th class="pb-2 text-center">Leaves</th>
                        </tr>
                    </thead>
                    <tbody id="reportData" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // YOUR EXACT URL
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzu4ZJyeifn_CEIKWJgpl39oxscN1VQbxqAU6a9TDfPLJa0120sJ-IDopfJJQ9N_K-NiA/exec";
        
        const HOSPITAL_LOC = { lat: -1.2448, lon: 36.6619, rad: 500 }; 
        let isRegisterMode = false;
        let currentUser = null;

        function toggleRegister() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('modeText').innerText = isRegisterMode ? "Staff Registration" : "Staff Portal";
            document.getElementById('mainBtn').innerText = isRegisterMode ? "REGISTER PASSWORD" : "LOG IN";
            document.getElementById('toggleBtn').innerText = isRegisterMode ? "Back to Login" : "First time? Register here";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Fill all fields");

            document.getElementById('mainBtn').innerText = "CONNECTING...";

            try {
                const response = await fetch(CLOUD_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: "check_auth", 
                        email: email, 
                        password: pass, 
                        type: isRegisterMode ? "register" : "login" 
                    })
                });

                const data = await response.json();

                if (isRegisterMode) {
                    if (data.result === "registered") {
                        alert("Success! You are now registered. Please log in.");
                        toggleRegister();
                    } else { alert("Email not found in authorized Staff list."); }
                } else {
                    if (data.exists && data.savedPass === pass) {
                        currentUser = data;
                        document.getElementById('welcomeMsg').innerText = `Hello, ${data.name}`;
                        document.getElementById('staffDetails').innerText = `${data.dept} | ${data.desig}`;
                        document.getElementById('authSection').classList.add('hidden');
                        document.getElementById('clockSection').classList.remove('hidden');
                    } else { alert("Invalid email or password."); }
                }
            } catch (e) {
                alert("Connection Error. Check your Google Script 'Who has access' setting.");
            }
            document.getElementById('mainBtn').innerText = isRegisterMode ? "REGISTER PASSWORD" : "LOG IN";
        }

        async function submitShift(type) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, HOSPITAL_LOC.lat, HOSPITAL_LOC.lon);
                if (dist > HOSPITAL_LOC.rad) return alert("Out of range.");

                await fetch(CLOUD_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        id: currentUser.id, name: currentUser.name,
                        dept: currentUser.dept, desig: currentUser.desig,
                        type: type, loc: `${pos.coords.latitude.toFixed(4)},${pos.coords.longitude.toFixed(4)}`
                    })
                });
                alert(type + " recorded!");
            });
        }

        async function showAdmin() {
            const adminPass = prompt("Admin Password:");
            if(adminPass === "Admin99") {
                document.getElementById('adminSection').classList.remove('hidden');
                const resp = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify({ action: "generate_report" }) });
                const data = await resp.json();
                document.getElementById('reportData').innerHTML = data.map(row => `
                    <tr class="border-b border-slate-900">
                        <td class="py-2">${row.name}</td>
                        <td class="py-2 text-center">${row.days}</td>
                        <td class="py-2 text-center text-teal-400 font-bold">${row.totalHours}h</td>
                        <td class="py-2 text-center text-rose-400">${row.leaveDays}</td>
                    </tr>
                `).join('');
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }
    </script>
</body>
</html>
